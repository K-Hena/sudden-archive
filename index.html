<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>서든 아카이브</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon-180.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Gothic+A1:wght@700;900&display=swap');

@font-face {
  font-family: 'Paperlogy';
  font-weight: 800;
  font-style: normal;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy-8ExtraBold.woff2') format('woff2'),
       url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');
}
@font-face {
  font-family: 'Paperlogy';
  font-weight: 900;
  font-style: normal;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy-9Black.woff2') format('woff2'),
       url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
}

:root{
  --bg:#0A0C0F;
  --panel:#14171C;
  --panel-hi:#1B1F26;
  --line:#252A31;
  --text:#E6E9ED;
  --muted:#7E8792;
  --red:#E4364A;
  --red-dim:#3A1A20;
  --blue:#3B7DE8;
  --blue-dim:#152436;
  --amber:#F2A93B;
  --edit-accent:#FF5C9E;
  --edit-accent-ink:#2A0A18;
  --green:#4CD97B;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding-bottom:60px;
}
.mono{font-family:'JetBrains Mono',monospace;}
.cut-sm{clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);}

header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 32px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#0D1013,#0A0C0F);
}
.brand{display:flex;align-items:center;gap:12px;}
.reticle{width:26px;height:26px;position:relative;border:2px solid #FFFFFF;border-radius:50%;}
.reticle::before,.reticle::after{content:'';position:absolute;background:#FFFFFF;}
.reticle::before{width:2px;height:10px;left:11px;top:-6px;}
.reticle::after{width:10px;height:2px;top:11px;left:-6px;}
.brand h1{font-family:'Paperlogy',sans-serif;font-weight:800;font-size:26px;letter-spacing:0;line-height:1.4;}
.brand span{color:var(--red);}
.status{font-size:12px;color:var(--muted);letter-spacing:0.08em;display:flex;align-items:center;gap:18px;}
.status b{color:var(--text);}

.subbar{
  padding:14px 32px;display:flex;align-items:center;gap:10px;
  font-size:12px;color:var(--muted);letter-spacing:0.06em;border-bottom:1px solid var(--line);
}
.subbar b{color:var(--text);cursor:pointer;}
.subbar .sep{color:#3A4048;}

.view{padding:28px 32px;display:none;}
.view.active{display:block;}
.section-label{
  font-size:12px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--line);}
.map-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px;}
.map-head .section-label{flex:1;margin-bottom:0;}
.map-head .detail-search{margin-bottom:0;}
.detail-toolbar .back-btn{margin-bottom:0;}

.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.map-tile{
  background:var(--panel);border:1px solid var(--line);height:220px;cursor:pointer;
  position:relative;overflow:hidden;transition:border-color .15s, transform .15s;
}
.map-tile:hover{border-color:#FFFFFF;transform:translateY(-2px);}
.map-thumb{height:150px;position:relative;display:flex;align-items:center;justify-content:center;}
.map-thumb .no-img{font-family:'JetBrains Mono',monospace;font-size:10px;color:#3A4048;letter-spacing:0.06em;}
.map-tile:nth-child(6n+1) .map-thumb{background:linear-gradient(135deg,#26313F,#111820);}
.map-tile:nth-child(6n+2) .map-thumb{background:linear-gradient(135deg,#2E1F1F,#150F10);}
.map-tile:nth-child(6n+3) .map-thumb{background:linear-gradient(135deg,#1F2A24,#0F1512);}
.map-tile:nth-child(6n+4) .map-thumb{background:linear-gradient(135deg,#2A2233,#131019);}
.map-tile:nth-child(6n+5) .map-thumb{background:linear-gradient(135deg,#332A1B,#171208);}
.map-tile:nth-child(6n+6) .map-thumb{background:linear-gradient(135deg,#1E2733,#0D1319);}
.map-tile .info{padding:12px 14px;}
.map-tile .name{font-family:'Paperlogy',sans-serif;font-weight:800;font-size:20px;}
.map-tile .count{font-size:11px;color:var(--muted);margin-top:2px;}

.detail-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:20px;}
.detail-title{font-family:'Paperlogy',sans-serif;font-weight:800;font-size:26px;letter-spacing:0;color:var(--text);}
.detail-title span{color:var(--muted);font-size:14px;font-weight:500;font-family:'Inter';margin-left:10px;}

.team-toggle{display:flex;border:1px solid var(--line);}
.team-toggle button{
  font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:0.08em;
  background:var(--panel);color:var(--muted);border:none;padding:9px 22px;cursor:pointer;font-size:13px;
  border-right:1px solid var(--line);
}
.team-toggle button:last-child{border-right:none;}
.team-toggle button.on-red{color:var(--red);background:var(--red-dim);}
.team-toggle button.on-blue{color:var(--blue);background:var(--blue-dim);}
.team-toggle button.on-total{color:var(--text);background:var(--panel-hi);}
.team-toggle button.on-favorite{color:var(--amber);background:var(--panel-hi);}
.detail-search{
  display:block;width:100%;max-width:420px;box-sizing:border-box;margin-bottom:20px;padding:10px 12px;
  background:var(--panel);color:var(--text);border:1px solid var(--line);font:13px 'Inter',sans-serif;
}
.detail-search:focus{outline:none;border-color:#FFFFFF;}
@media(max-width:600px){
  .map-head{align-items:stretch;flex-direction:column;}
  .map-head .detail-search{max-width:none;}
  .detail-toolbar .back-btn{align-self:flex-start;}
  .paste-choices{flex-direction:column;}
  #savePreviewWrap{flex-direction:column;}
}

.tag-section{margin-bottom:34px;}
.tag-section .section-label{margin-bottom:16px;}
.tag-section .section-label b{
  color:var(--red);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;letter-spacing:0.1em;
}

.card-grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.card{background:var(--panel);border:1px solid var(--line);cursor:pointer;transition:border-color .15s;position:relative;}
.card:hover{border-color:#FFFFFF;}
.card .card-del{
  position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(6,7,9,.8);
  display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);
  cursor:pointer;opacity:0;transition:opacity .15s;z-index:2;
}
.card:hover .card-del{opacity:1;}
.card .card-del:hover{color:var(--red);}
.card .card-edit{
  position:absolute;top:6px;right:36px;width:24px;height:24px;background:rgba(6,7,9,.8);
  display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);
  cursor:pointer;opacity:0;transition:opacity .15s;z-index:2;
}
.card:hover .card-edit{opacity:1;}
.card .card-edit:hover{color:var(--edit-accent);}
.card-fav{
  position:absolute;top:6px;right:6px;width:32px;height:32px;z-index:3;cursor:pointer;font-size:20px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  padding:0;border:0;background:transparent;color:var(--muted);
  text-shadow:0 1px 2px rgba(0,0,0,.6);
}
.card-fav.with-delete{right:66px;}
.card-fav.on,.card-fav:hover{color:var(--amber);}
.card-fav:focus-visible{outline:1px solid var(--amber);outline-offset:2px;}
.thumb{
  height:130px;position:relative;background:linear-gradient(135deg,#1A1E24,#0F1216);
  display:flex;align-items:center;justify-content:center;
}
.thumb .badge{
  position:absolute;top:8px;left:8px;font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:0.05em;padding:3px 7px;text-transform:uppercase;
}
.badge.vid{background:var(--red);color:#fff;}
.badge.img{background:var(--blue);color:#fff;}
.badge.short{background:#8B5CF6;color:#fff;}
.playicon{
  width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;color:#fff;
}
.playicon::before{content:'';border-left:12px solid #fff;border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:3px;}
.card .meta{padding:10px 12px;}
.card .title{
  font-size:13.5px;font-weight:500;margin-bottom:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card .note{
  font-size:11.5px;color:var(--muted);line-height:1.5;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}

.back-btn{
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.06em;
  color:var(--muted);background:none;border:1px solid var(--line);padding:8px 16px;cursor:pointer;margin-bottom:18px;
}
.back-btn:hover{color:#FFFFFF;border-color:#FFFFFF;}

.overlay{
  display:none;position:fixed;inset:0;background:rgba(6,7,9,.92);z-index:50;
  align-items:center;justify-content:center;padding:40px;
}
.overlay.active{display:flex;}
.overlay-box{display:flex;flex-direction:column;align-items:center;}
.overlay-media{
  background:#000;border:1px solid var(--line);overflow:hidden;position:relative;
  display:flex;align-items:center;justify-content:center;color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-size:12px;
}
.overlay-media.wide{width:min(880px,90vw);aspect-ratio:16/9;}
.overlay-media.tall{height:min(80vh,720px);aspect-ratio:9/16;}
#overlayMediaContent{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.overlay-media iframe,.overlay-media img{width:100%;height:100%;display:block;object-fit:contain;border:0;}
.overlay-playpause{
  position:absolute;bottom:14px;left:14px;z-index:5;width:40px;height:40px;border-radius:50%;
  background:rgba(6,7,9,.75);color:#fff;border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;
}
.overlay-playpause:hover{border-color:var(--edit-accent);color:var(--edit-accent);}
.overlay-meta{width:100%;max-width:880px;padding:14px 2px;display:flex;justify-content:space-between;align-items:flex-start;}
.overlay-meta .note{font-size:12.5px;color:var(--muted);max-width:70%;line-height:1.5;}
.overlay-close{
  color:var(--muted);cursor:pointer;font-family:'JetBrains Mono';font-size:12px;
  border:1px solid var(--line);padding:6px 12px;
}
.overlay-close:hover{color:var(--red);border-color:var(--red);}
.loading{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);padding:40px;text-align:center;}

.site-footer{
  text-align:center;padding:24px 32px;margin-top:20px;
  border-top:1px solid var(--line);
  font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A515B;letter-spacing:0.03em;
}
.discord-btn{
  background:var(--red-dim);
  color:var(--red);
  border:1px solid var(--red);
  border-radius:0;
  padding:7px 16px;
  font-family:'Rajdhani',sans-serif;
  font-weight:600;
  font-size:12px;
  letter-spacing:0.06em;
  cursor:pointer;
}
.discord-btn:hover{background:var(--red);color:#fff;}
.admin-badge{
  background:var(--red-dim);
  color:var(--red);
  border:1px solid var(--red);
  padding:3px 8px;
  font-family:'Rajdhani',sans-serif;
  font-weight:700;
  font-size:10px;
  letter-spacing:0.08em;
}
.editmode-btn{
  background:none;
  color:var(--muted);
  border:1px solid var(--line);
  border-radius:0;
  padding:7px 16px;
  font-family:'Rajdhani',sans-serif;
  font-weight:600;
  font-size:12px;
  letter-spacing:0.06em;
  cursor:pointer;
}
.editmode-btn:hover{border-color:var(--edit-accent);color:var(--edit-accent);}
.editmode-btn.on{
  background:var(--edit-accent);
  color:var(--edit-accent-ink);
  border-color:var(--edit-accent);
}
.map-tile .tile-actions{position:absolute;top:6px;right:6px;display:flex;gap:5px;opacity:0;transition:opacity .15s;z-index:2;}
.map-tile:hover .tile-actions{opacity:1;}
.tile-actions span{width:24px;height:24px;background:rgba(6,7,9,.8);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);cursor:pointer;}
.tile-actions span:hover{color:var(--edit-accent);}
.tile-actions span.del:hover{color:var(--red);}
.add-tile{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;border:1px dashed var(--line);color:var(--muted);cursor:pointer;min-height:130px;}
.add-tile:hover{color:var(--edit-accent);border-color:var(--edit-accent);}
.add-tile .plus{font-size:28px;font-family:'Rajdhani';}
.add-tile .label{font-size:12px;letter-spacing:0.06em;}

.modal{display:none;position:fixed;inset:0;background:rgba(6,7,9,.9);z-index:60;align-items:center;justify-content:center;padding:30px;overflow:auto;}
.modal.active{display:flex;}
.modal-box{background:var(--panel);border:1px solid var(--line);width:min(560px,95vw);max-height:90vh;overflow:auto;}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;letter-spacing:0.04em;}
.modal-head .x{cursor:pointer;color:var(--muted);font-family:'JetBrains Mono';}
.modal-head .x:hover{color:var(--red);}
.modal-body{padding:20px;}
.modal-body label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:0.03em;}
.modal-body input[type=text], .modal-body input[type=url], .modal-body textarea, .modal-body select{width:100%;background:#0D1013;border:1px solid var(--line);color:var(--text);padding:9px 10px;font-family:'Inter',sans-serif;font-size:13px;margin-bottom:14px;}
.modal-body input[readonly]{opacity:.6;cursor:not-allowed;}
.modal-body textarea{resize:vertical;min-height:44px;}
.modal-body input[type=file]{width:100%;background:#0D1013;border:1px solid var(--line);color:var(--text);padding:9px 10px;font-family:'Inter',sans-serif;font-size:12px;margin-bottom:10px;}
.paste-step{text-align:center;padding:24px 0 10px;}
.paste-choices{display:flex;gap:12px;}
.paste-box{flex:1;border:1.5px dashed var(--line);padding:26px 12px;cursor:pointer;color:var(--muted);background:none;font-family:inherit;transition:border-color .15s,color .15s;}
.paste-box:hover{border-color:var(--red);color:var(--red);}
.paste-box-icon{font-size:26px;margin-bottom:8px;}
.paste-box-label{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--text);}
.paste-box:hover .paste-box-label{color:var(--red);}
.paste-box-hint{font-size:10.5px;color:var(--muted);margin-top:4px;letter-spacing:0.03em;}
.paste-fallback{margin-top:14px;}
.cropper-wrap{max-height:340px;margin-bottom:14px;display:none;}
.cropper-wrap img{max-width:100%;display:block;}
#savePreviewWrap{margin-bottom:14px;gap:14px;align-items:flex-start;}
#savePreviewWrap #teamWrap{flex:1;min-width:0;}
.save-thumb-16x9{position:relative;width:100%;aspect-ratio:16/9;background:#000;overflow:hidden;margin-bottom:10px;display:flex;align-items:center;justify-content:center;}
.save-thumb-16x9 img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.save-thumb-16x9 .playicon{position:relative;z-index:1;}
.save-thumb-badge{position:absolute;bottom:8px;right:8px;background:rgba(6,7,9,.75);color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 7px;letter-spacing:0.02em;z-index:1;}
.save-thumb-sq{width:150px;height:150px;flex:none;background:#000;overflow:hidden;}
.save-thumb-sq img{width:100%;height:100%;object-fit:cover;display:block;}
.clip-tools{margin-bottom:14px;}
.clip-player{width:100%;aspect-ratio:16/9;background:#000;margin-bottom:10px;}
.clip-player.tall{width:min(100%,calc(min(60vh,480px) * 0.5625));height:auto;aspect-ratio:9/16;margin:0 auto 10px;}
.clip-player iframe{width:100%;height:100%;border:0;}
.clip-sliders{margin-bottom:14px;}
.clip-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:0.03em;}
.clip-labels b{color:var(--edit-accent);font-family:'JetBrains Mono',monospace;font-weight:500;}
.clip-range-slider{position:relative;height:28px;}
.clip-range-track{position:absolute;top:50%;left:0;right:0;height:4px;transform:translateY(-50%);background:#0D1013;border:1px solid var(--line);}
.clip-range-fill{position:absolute;top:50%;height:4px;transform:translateY(-50%);background:var(--edit-accent);pointer-events:none;}
.clip-range-input{position:absolute;top:0;left:0;width:100%;height:28px;margin:0;padding:0;-webkit-appearance:none;appearance:none;background:none;pointer-events:none;}
.clip-range-input::-webkit-slider-runnable-track{background:transparent;height:28px;}
.clip-range-input::-moz-range-track{background:transparent;height:28px;border:none;}
.clip-range-input::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;pointer-events:auto;width:16px;height:16px;margin-top:6px;border-radius:50%;background:var(--edit-accent);border:2px solid #0A0C0F;cursor:pointer;}
.clip-range-input::-moz-range-thumb{pointer-events:auto;width:16px;height:16px;border-radius:50%;background:var(--edit-accent);border:2px solid #0A0C0F;cursor:pointer;}
.clip-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
.clip-btns button{font-family:'JetBrains Mono',monospace;font-size:11px;background:#0D1013;color:var(--text);border:1px solid var(--line);padding:8px 12px;cursor:pointer;}
.clip-btns button:hover{border-color:var(--edit-accent);color:var(--edit-accent);}
.clip-range{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto;}
.clip-range b{color:var(--edit-accent);}
.hint{font-size:10.5px;color:#5A626D;margin-bottom:14px;line-height:1.5;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;}
.btn-primary{font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:0.06em;font-size:13px;background:var(--edit-accent);color:var(--edit-accent-ink);border:none;padding:10px 22px;cursor:pointer;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-ghost{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;background:none;color:var(--muted);border:1px solid var(--line);padding:10px 18px;cursor:pointer;}
.msg-modal{font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:8px;min-height:14px;}
.msg-modal.err{color:var(--red);}
.msg-modal.ok{color:var(--green);}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="reticle"></div>
    <h1>서든 <span>아카이브</span></h1>
  </div>
  <div class="status">
    <span class="mono"><b id="clipCount">-</b>&nbsp;CLIPS</span>
    <span class="mono"><b id="tipCount">-</b>&nbsp;TIPS</span>
    <span id="authArea" style="display:flex;align-items:center;gap:10px;"></span>
  </div>
</header>

<div class="subbar">
  <b onclick="showMapGrid()">전체 맵</b>
  <span class="sep" id="crumbSep" style="display:none">/</span>
  <b id="crumbMap" style="display:none"></b>
</div>

<div class="view active" id="viewGrid">
  <div class="map-head">
    <div class="section-label">맵 선택</div>
    <input type="search" id="globalTitleSearch" class="detail-search" placeholder="전체 제목 검색" aria-label="전체 제목 검색" oninput="renderGlobalTitleSearch()">
  </div>

<script>
// ============================================================
// TODO: 여기 두 줄만 채우면 됨
// Supabase 프로젝트 대시보드 > Project Settings > API 에서 복사
// ============================================================
const SUPABASE_URL = 'https://mvyepqqstaipxqfesalv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Ig7a3XgfX1xpJbblRiol9A_lMbNXzs5';

let sb;
try {
  if(!window.supabase){
    throw new Error('supabase-js 라이브러리를 못 불러왔어요 (CDN 차단/네트워크 문제일 수 있어요)');
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} catch(e){
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('mapGrid').innerHTML =
      `<div class="loading">초기화 실패: ${e.message}</div>`;
  });
}

let maps = [];
let items = [];
let currentMap = null;   // 맵 id
let currentMapName = '';
let currentTeam = 'total';
let currentSession = null;
let favorites = [];
const favoritePending = new Set();
const tagOrder = ['맵 지명', '위폭', '팁'];

async function loadAll(){
  if(!sb) return; // 위에서 초기화 실패한 경우 여기서 중단
  try {
    const { data: mapRows, error: mapErr } = await sb
      .from('maps').select('*').order('sort_order', { ascending: true });
    const { data: itemRows, error: itemErr } = await sb
      .from('items').select('*');

    if(mapErr || itemErr){
      document.getElementById('mapGrid').innerHTML =
        `<div class="loading">데이터를 불러오지 못했어요.<br>${(mapErr||itemErr).message}</div>`;
      return;
    }
    maps = mapRows;
    items = itemRows;
    document.getElementById('clipCount').textContent = items.filter(i=>i.type==='vid').length;
    document.getElementById('tipCount').textContent = items.filter(i=>i.tag==='팁').length;
    renderMapGrid();
  } catch(e){
    document.getElementById('mapGrid').innerHTML =
      `<div class="loading">요청 중 오류가 발생했어요.<br>${e.message}</div>`;
  }
}

function renderMapGrid(){
  if(document.getElementById('globalTitleSearch').value.trim()){ renderGlobalTitleSearch(); return; }
  const grid = document.getElementById('mapGrid');
  const tilesHtml = maps.map(m => {
    const count = items.filter(i => i.map_id === m.id).length;
    const safe = m.name.replace(/'/g,"\\'");
    const actions = editMode ? `
      <div class="tile-actions">
        <span onclick="pickMapImage(event,'${m.id}')" title="이미지 변경">🖼</span>
        <span onclick="renameMap(event,'${m.id}','${safe}')" title="이름 변경">✎</span>
        <span class="del" onclick="deleteMap(event,'${m.id}','${safe}')" title="맵 삭제">✕</span>
      </div>` : '';
    return `
    <div class="map-tile cut-sm" onclick="openMap('${m.id}','${safe}')">
      ${actions}
      <div class="map-thumb" style="${m.img ? `background-image:url('${m.img}');background-size:cover;background-position:center;` : ''}">
        ${m.img ? '' : '<span class="no-img">이미지 없음</span>'}
      </div>
      <div class="info">
        <div class="name">${m.name}</div>
        <div class="count mono">${count} ITEMS</div>
      </div>
    </div>
  `;}).join('');
  const addTile = editMode ? `<div class="map-tile add-tile cut-sm" onclick="addMap()"><div class="plus">+</div><div class="label">맵 추가</div></div>` : '';
  grid.innerHTML = (tilesHtml || (editMode ? '' : `<div class="loading">등록된 맵이 없어요.</div>`)) + addTile;
}

function renderGlobalTitleSearch(){
  const query = document.getElementById('globalTitleSearch').value.trim().toLowerCase();
  if(!query){ renderMapGrid(); return; }
  const filtered = sortFavorites(items.filter(it => String(it.title ?? '').toLowerCase().includes(query)));
  document.getElementById('mapGrid').innerHTML = filtered.map(it => {
    const p = it.type === 'vid' ? parseYouTube(it.video_url) : null;
    const thumbUrl = it.type === 'vid' ? ytThumb(it.video_url) : it.img_url;
    const mapName = maps.find(m => m.id === it.map_id)?.name || '알 수 없는 맵';
    return `
    <div class="card" onclick="openOverlay('${it.id}')">
      ${favoriteButton(it)}
      <div class="thumb" style="${thumbUrl ? `background-image:url('${thumbUrl}');background-size:cover;background-position:center;` : ''}">
        <div class="badge ${it.type}">${it.type==='vid' ? '영상' : '이미지'}</div>
        ${(p && p.isShort) ? '<div class="badge short" style="left:auto;right:8px;">쇼츠</div>' : ''}
        ${thumbUrl
          ? (it.type==='vid' ? '<div class="playicon"></div>' : '')
          : `<span class="mono" style="font-size:10px;color:#3A4048;">${it.type==='vid' ? '아직 등록된 영상 없음' : '아직 등록된 이미지 없음'}</span>`}
      </div>
      <div class="meta">
        <div class="title">${it.title}</div>
        ${it.note ? `<div class="note">${it.note}</div>` : ''}
        <div class="note">${mapName} · ${teamLabel(it.team) || String(it.team || '').toUpperCase()}</div>
      </div>
    </div>`;
  }).join('') || `<div class="mono" style="color:var(--muted);font-size:12px;">일치하는 제목이 없어요.</div>`;
}

async function addMap(){
  const name = prompt('추가할 맵 이름을 입력하세요');
  if(!name || !name.trim()) return;
  if(maps.some(m => m.name === name.trim())){ alert('이미 있는 맵 이름이에요.'); return; }
  const maxOrder = maps.reduce((mx,m) => Math.max(mx, m.sort_order||0), 0);
  const { error } = await sb.from('maps').insert({ name: name.trim(), sort_order: maxOrder+1 });
  if(error){ alert('추가 실패: ' + error.message); return; }
  await loadAll();
}
async function renameMap(e,id,oldName){
  e.stopPropagation();
  const name = prompt('새 맵 이름', oldName);
  if(!name || !name.trim() || name.trim() === oldName) return;
  const { error } = await sb.from('maps').update({ name: name.trim() }).eq('id', id);
  if(error){ alert('변경 실패: ' + error.message); return; }
  await loadAll();
}
async function deleteMap(e,id,name){
  e.stopPropagation();
  const count = items.filter(i => i.map_id === id).length;
  const warn = count > 0
    ? `⚠️ "${name}" 맵을 삭제하면 이 맵에 등록된 ${count}개 항목(영상·이미지)도 함께 영구 삭제됩니다.\n\n정말 삭제하시겠어요? 되돌릴 수 없어요.`
    : `⚠️ "${name}" 맵을 삭제하시겠어요? 되돌릴 수 없어요.`;
  if(!confirm(warn)) return;
  const { error } = await sb.from('maps').delete().eq('id', id);
  if(error){ alert('삭제 실패: ' + error.message); return; }
  await loadAll();
}

async function deleteItem(e,id){
  e.stopPropagation();
  if(!confirm('이 항목을 삭제하시겠어요? 되돌릴 수 없어요.')) return;
  const { error } = await sb.from('items').delete().eq('id', id);
  if(error){ alert('삭제 실패: ' + error.message); return; }
  await loadAll();
  renderCards();
}

let pendingMapId = null;
function pickMapImage(e,id){ e.stopPropagation(); pendingMapId = id; document.getElementById('mapImgInput').click(); }
document.getElementById('mapImgInput').addEventListener('change', async function(e){
  const file = e.target.files[0]; if(!file || !pendingMapId) return;
  const ext = (file.name.split('.').pop() || 'jpg').replace(/[^A-Za-z0-9]/g,'').toLowerCase() || 'jpg';
  const path = `maps/${pendingMapId}-${Date.now()}.${ext}`;
  const { error: up } = await sb.storage.from('media').upload(path, file);
  if(up){ alert('업로드 실패: ' + up.message); return; }
  const { data: pub } = sb.storage.from('media').getPublicUrl(path);
  const { error: upd } = await sb.from('maps').update({ img: pub.publicUrl }).eq('id', pendingMapId);
  if(upd){ alert('저장 실패: ' + upd.message); return; }
  pendingMapId = null; e.target.value = ''; await loadAll();
});

function showMapGrid(){
  clearTitleSearch();
  clearGlobalTitleSearch();
  document.getElementById('viewGrid').classList.add('active');
  document.getElementById('viewDetail').classList.remove('active');
  document.getElementById('crumbMap').style.display = 'none';
  document.getElementById('crumbSep').style.display = 'none';
  renderMapGrid();
}

function openMap(id, name){
  clearGlobalTitleSearch();
  currentMap = id;
  currentMapName = name;
  document.getElementById('viewGrid').classList.remove('active');
  document.getElementById('viewDetail').classList.add('active');
  document.getElementById('crumbMap').style.display = 'inline';
  document.getElementById('crumbSep').style.display = 'inline';
  document.getElementById('crumbMap').textContent = name;
  document.getElementById('detailTitle').innerHTML = name + ' <span id="detailCount"></span>';
  setTeam('total');
}

function setTeam(t){
  if(t === 'favorite' && !currentSession){
    if(confirm('즐겨찾기 보기는 Discord 로그인이 필요합니다. 로그인할까요?')) discordLogin();
    return;
  }
  currentTeam = t;
  clearTitleSearch();
  document.getElementById('btnTotal').className = t==='total' ? 'on-total' : '';
  document.getElementById('btnRed').className = t==='red' ? 'on-red' : '';
  document.getElementById('btnBlue').className = t==='blue' ? 'on-blue' : '';
  document.getElementById('btnFavorite').className = t==='favorite' ? 'on-favorite' : '';
  renderCards();
}

function clearTitleSearch(){ document.getElementById('titleSearch').value = ''; }
function clearGlobalTitleSearch(){ document.getElementById('globalTitleSearch').value = ''; }

function favoriteRow(id){ return favorites.find(f => f.item_id === id); }
function sortFavorites(list){
  return [...list].sort((a, b) => {
    const af = favoriteRow(a.id), bf = favoriteRow(b.id);
    if(af && bf) return new Date(bf.created_at) - new Date(af.created_at);
    return af ? -1 : (bf ? 1 : 0);
  });
}
function favoriteButton(it, withDelete = false){
  if(it.tag !== '위폭' && it.tag !== '팁') return '';
  const active = !!favoriteRow(it.id);
  return `<button type="button" class="card-fav${active ? ' on' : ''}${withDelete ? ' with-delete' : ''}" aria-label="즐겨찾기 ${active ? '해제' : '추가'}" onclick="toggleFavorite(event,'${it.id}')">${active ? '★' : '☆'}</button>`;
}
function rerenderCurrentView(){
  if(document.getElementById('viewDetail').classList.contains('active')) renderCards();
  else renderMapGrid();
}
async function discordLogin(){
  const { error } = await sb.auth.signInWithOAuth({ provider: 'discord' });
  if(error) alert('로그인 실패: ' + error.message);
}
async function loadFavorites(){
  const userId = currentSession && currentSession.user.id;
  if(!userId){ favorites = []; return; }
  const { data, error } = await sb.from('favorites').select('item_id, created_at').order('created_at', { ascending: false });
  if(currentSession && currentSession.user.id === userId){
    favorites = error ? [] : (data || []);
    if(error) alert('즐겨찾기를 불러오지 못했어요: ' + error.message);
  }
}
async function toggleFavorite(e, itemId){
  e.stopPropagation();
  if(!currentSession){
    if(confirm('Discord 로그인이 필요한 기능입니다. 로그인할까요?')) discordLogin();
    return;
  }
  const userId = currentSession.user.id;
  if(favoritePending.has(itemId)) return;
  favoritePending.add(itemId);
  try {
    const existing = favoriteRow(itemId);
    if(existing){
      const { error } = await sb.from('favorites').delete().eq('user_id', userId).eq('item_id', itemId);
      if(error) throw error;
      if(!currentSession || currentSession.user.id !== userId) return;
      favorites = favorites.filter(f => f.item_id !== itemId);
    } else {
      const { data, error } = await sb.from('favorites').insert({ user_id: userId, item_id: itemId }).select('item_id, created_at').single();
      if(error) throw error;
      if(!currentSession || currentSession.user.id !== userId) return;
      favorites = [data, ...favorites];
    }
    rerenderCurrentView();
  } catch(error){
    alert('즐겨찾기 변경 실패: ' + error.message);
  } finally {
    favoritePending.delete(itemId);
  }
}

async function trackClick(itemId){
  try {
    const { error } = await sb.from('item_clicks').insert({
      item_id: itemId,
      user_id: currentSession?.user?.id || null
    });
    if(error) console.warn('클릭 기록 실패:', error.message);
  } catch(error){
    console.warn('클릭 기록 실패:', error);
  }
}

function parseYouTube(url){
  if(!url) return null;
  const short = url.match(/shorts\/([A-Za-z0-9_-]{6,})/);
  if(short) return { id: short[1], isShort: true };
  const normal = url.match(/(?:youtu\.be\/|v=)([A-Za-z0-9_-]{6,})/);
  if(normal) return { id: normal[1], isShort: false };
  return null;
}
function ytThumb(url){
  const p = parseYouTube(url);
  return p ? `https://img.youtube.com/vi/${p.id}/hqdefault.jpg` : '';
}

function teamLabel(team){
  if(team === 'red') return 'RED';
  if(team === 'blue') return 'BLUE';
  if(team === 'none') return '공통';
  console.warn('알 수 없는 team 값:', team);
  return null;
}
function teamBadge(it){
  if(currentTeam !== 'total' && currentTeam !== 'favorite') return '';
  const label = teamLabel(it.team);
  if(!label) return '';
  const bg = it.team === 'red' ? 'var(--red)' : it.team === 'blue' ? 'var(--blue)' : 'var(--muted)';
  const color = it.team === 'none' ? 'var(--bg)' : '#fff';
  return `<div class="badge" style="top:28px;left:8px;background:${bg};color:${color};">${label}</div>`;
}

// 유튜브 IFrame API 로드 (클립 구간 제어용)
let ytReady = false, ytPlayer = null;
(function(){
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();
window.onYouTubeIframeAPIReady = function(){ ytReady = true; };

function renderCards(){
  const query = document.getElementById('titleSearch').value.trim().toLowerCase();
  const mapItems = items.filter(i => i.map_id === currentMap);
  const teamItems = currentTeam === 'total' ? mapItems
    : currentTeam === 'favorite' ? mapItems.filter(i => favoriteRow(i.id))
    : mapItems.filter(i => i.team === currentTeam);
  const filtered = query ? teamItems.filter(i => String(i.title ?? '').toLowerCase().includes(query)) : teamItems;
  document.getElementById('detailCount').textContent = '(' + filtered.length + ')';

  const groups = {};
  filtered.forEach(it => {
    if(!groups[it.tag]) groups[it.tag] = [];
    groups[it.tag].push(it);
  });
  tagOrder.forEach(t => { if(!groups[t]) groups[t] = []; });

  const sortedTags = Object.keys(groups)
    .filter(t => (editMode && !query) || groups[t].length > 0)
    .sort((a, b) => {

    return `
    <div class="tag-section">
      <div class="section-label"><b>${tag}</b></div>
      <div class="card-grid-inner">
        ${list.map(it => {
          const p = it.type === 'vid' ? parseYouTube(it.video_url) : null;
          const thumbUrl = it.type === 'vid' ? ytThumb(it.video_url) : it.img_url;

          return `
          <div class="card" onclick="openOverlay('${it.id}')">
            ${editMode ? `<span class="card-edit" onclick="openEditModal(event,'${it.id}')" title="수정">⚙</span>` : ''}
            ${editMode ? `<span class="card-del" onclick="deleteItem(event,'${it.id}')" title="삭제">✕</span>` : ''}
            ${favoriteButton(it, editMode)}
            <div class="thumb" style="${thumbUrl ? `background-image:url('${thumbUrl}');background-size:cover;background-position:center;` : ''}">
              <div class="badge ${it.type}">${it.type==='vid' ? '영상' : '이미지'}</div>
              ${shortBadge}
              ${teamBadge(it)}
              ${thumbUrl
                ? (it.type==='vid' ? '<div class="playicon"></div>' : '')
                : `<span class="mono" style="font-size:10px;color:#3A4048;">${it.type==='vid' ? '아직 등록된 영상 없음' : '아직 등록된 이미지 없음'}</span>`
              }
            </div>
            ${isMapLabel ? '' : `
            <div class="meta">
              <div class="title">${it.title}</div>
              ${it.note ? `<div class="note">${it.note}</div>` : ''}
            </div>`}
          </div>
        `;}).join('') + addTileHtml}
      </div>
    </div>
  `;
  }).join('') || `<div class="mono" style="color:var(--muted);font-size:12px;">${query ? '일치하는 제목이 없어요.' : '이 진영에 등록된 항목이 없어요.'}</div>`;
}

let clipTimer = null;
let overlayVideoId = null;
let overlayHasClip = false;
function openOverlay(id){
  void trackClick(id);
  const it = items.find(i => i.id === id);
  const media = document.getElementById('overlayMediaContent');
  const playPauseBtn = document.getElementById('overlayPlayPause');
  const fullBtn = document.getElementById('overlayFullBtn');

  // 이전 플레이어/타이머 정리
  if(clipTimer){ clearInterval(clipTimer); clipTimer = null; }
  if(ytPlayer && ytPlayer.destroy){ ytPlayer.destroy(); ytPlayer = null; }
  playPauseBtn.style.display = 'none';
  fullBtn.style.display = 'none';
  overlayVideoId = null;
  overlayHasClip = false;

  if(it.type === 'vid' && it.video_url){
    const p = parseYouTube(it.video_url);
    if(p){
      document.getElementById('overlayMedia').className = 'overlay-media ' + (p.isShort ? 'tall' : 'wide');
      const hasClip = (it.clip_start != null || it.clip_end != null);
      overlayHasClip = hasClip;
      overlayVideoId = p.id;

      if(hasClip){
        // 클립 구간이 있으면 JS 플레이어로 제어 (쇼츠도 구간 적용됨), 컨트롤바는 숨겨서 구간 밖으로 못 나가게 함
        const mount = document.createElement('div');
        media.innerHTML = '';
        media.appendChild(mount);
        const start = it.clip_start != null ? it.clip_start : 0;
        const end = it.clip_end != null ? it.clip_end : null;
        const build = () => {
          ytPlayer = new YT.Player(mount, {
            videoId: p.id,
            playerVars: { autoplay:1, playsinline:1, controls:0, rel:0, start:start, origin:location.origin, cc_load_policy:0 },
            events: {
              onReady: (e) => { e.target.setVolume(50); e.target.seekTo(start, true); e.target.playVideo(); },
              onStateChange: (e) => {
                if(e.data === YT.PlayerState.PLAYING){
                  playPauseBtn.textContent = '⏸';
                  if(end != null){
                    if(clipTimer) clearInterval(clipTimer);
                    clipTimer = setInterval(() => {
                      if(ytPlayer && ytPlayer.getCurrentTime && ytPlayer.getCurrentTime() >= end){
                        ytPlayer.seekTo(start, true); // 구간 반복
                      }
                    }, 250);
                  }
                } else if(e.data === YT.PlayerState.PAUSED){
                  playPauseBtn.textContent = '▶';
                }
              }
            }
          });
        };
        if(ytReady && window.YT && YT.Player){ build(); }
        else { const iv = setInterval(() => { if(window.YT && YT.Player){ clearInterval(iv); ytReady=true; build(); } }, 200); }

        playPauseBtn.textContent = '⏸';
        playPauseBtn.style.display = 'flex';
        fullBtn.style.display = 'inline-block';
      } else {
        // 구간 없으면 일반 임베드
        media.innerHTML = `<iframe src="https://www.youtube.com/embed/${p.id}?rel=0&autoplay=1&playsinline=1&cc_load_policy=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      }
    } else {
      document.getElementById('overlayMedia').className = 'overlay-media wide';
      media.innerHTML = `<span>유튜브 링크 형식을 확인해주세요</span>`;
    }
  } else if(it.type === 'img' && it.img_url){
    document.getElementById('overlayMedia').className = 'overlay-media wide';
    media.innerHTML = `<img src="${it.img_url}">`;
  } else {
    document.getElementById('overlayMedia').className = 'overlay-media wide';
    media.innerHTML = it.type==='vid' ? '<span>아직 등록된 영상이 없어요</span>' : '<span>아직 등록된 이미지가 없어요</span>';
  }
  document.getElementById('overlayNote').textContent = it.note ? it.title + ' — ' + it.note : it.title;
  document.getElementById('overlay').classList.add('active');
}
function toggleOverlayPlay(){
  if(!ytPlayer || !ytPlayer.getPlayerState) return;
  if(ytPlayer.getPlayerState() === YT.PlayerState.PLAYING){

}
function showFullVideo(){

  else { const iv = setInterval(() => { if(window.YT && YT.Player){ clearInterval(iv); ytReady=true; build(); } }, 200); }

  overlayHasClip = false;

function closeOverlay(){

let modalTag = null;
let modalType = 'vid';
let modalTeam = null;
let modalStep = 'paste';
let cropper = null;
let modalMode = 'add';
let editingItemId = null;
let clipStart = null, clipEnd = null, clipYtPlayer = null;
let clipPreviewTimer = null;
let clipDuration = 0;
let clipScrubLastSeek = 0;
let clipEndMarkGraceUntil = 0;

function fmtClip(s){
  if(s === null) return '—';
  const m = Math.floor(s / 60), ss = Math.floor(s % 60);
  return `${m}:${String(ss).padStart(2, '0')}`;
}
function updateClipLabel(){
  const el = document.getElementById('clipRange');
  if(clipStart === null && clipEnd === null){ el.innerHTML = '전체 재생'; return; }
  el.innerHTML = `구간 <b>${fmtClip(clipStart)}</b> ~ <b>${fmtClip(clipEnd)}</b>`;
}
function updateClipSliderLabels(){
  document.getElementById('clipStartLabel').textContent = fmtClip(Number(document.getElementById('clipStartRange').value));
  document.getElementById('clipEndLabel').textContent = fmtClip(Number(document.getElementById('clipEndRange').value));
}
function updateClipRangeFill(){
  const fill = document.getElementById('clipRangeFill');
  const startRange = document.getElementById('clipStartRange');
  const endRange = document.getElementById('clipEndRange');
  // 각 슬라이더가 실제로 렌더링되는 비율은 (value - 자신의 min) / (자신의 max - 자신의 min)이다.
  // 지금은 min/max를 항상 [0, clipDuration]으로 고정해두므로 이 비율이 곧 value/clipDuration과
  // 같지만, 혹시라도 min/max가 다른 값으로 바뀌는 경우에도 항상 실제 손잡이 위치와 일치하도록
  // value/clipDuration 대신 각 슬라이더 자신의 min/max를 기준으로 계산한다.
  const sMin = Number(startRange.min), sMax = Number(startRange.max);
  const eMin = Number(endRange.min), eMax = Number(endRange.max);
  const s = Number(startRange.value);
  const e = Number(endRange.value);
  const startFrac = sMax > sMin ? (s - sMin) / (sMax - sMin) : 0;
  const endFrac = eMax > eMin ? (e - eMin) / (eMax - eMin) : 0;
  const left = Math.min(startFrac, endFrac);
  const right = Math.max(startFrac, endFrac);
  // 네이티브 range 손잡이는 트랙 전체 폭이 아니라 (트랙폭 - 손잡이폭)만큼만 이동하고,
  // 손잡이 중심은 항상 손잡이 반지름(8px, thumb width 16px의 절반)만큼 안쪽에서 시작한다.
  fill.style.left = `calc(8px + (100% - 16px) * ${left})`;
  fill.style.width = `calc((100% - 16px) * ${Math.max(right - left, 0)})`;
}
// 시작/끝 슬라이더의 min/max는 항상 [0, clipDuration]으로 고정한다.
// (예전에는 서로 넘나들지 못하게 상대 슬라이더 값으로 startRange.max/endRange.min을
//  계속 좁혀서 막았는데, 그러면 각 슬라이더의 실제 min~max 폭이 clipDuration보다
//  좁아져서 "손잡이의 화면 위치 비율(value-min)/(max-min)"이 실제 재생 위치 비율
//  (value/clipDuration)과 어긋나 버렸다 — 두 손잡이가 화면상 역전되어 그려지거나
//  채움 바가 손잡이 밖으로 튀어나오는 근본 원인이었다. 교차 방지는 min/max를 좁히는
//  대신 onClipStartInput/onClipEndInput에서 "자기 자신의" value만 clamp해서 처리한다.)
function syncClipSliders(){
  const startRange = document.getElementById('clipStartRange');
  const endRange = document.getElementById('clipEndRange');
  const s = clipStart !== null ? clipStart : 0;
  const e = clipEnd !== null ? clipEnd : clipDuration;
  startRange.min = 0; startRange.max = clipDuration;
  endRange.min = 0; endRange.max = clipDuration;
  startRange.value = s;
  endRange.value = e;
  updateClipSliderLabels();
  updateClipRangeFill();
}

// 슬라이더의 min/max/value를 넘겨준 duration 기준으로 확정한다 (구간 재설정 시 공통으로 재사용)
function applyClipDuration(duration){
  clipDuration = duration;
  const startRange = document.getElementById('clipStartRange');
  const endRange = document.getElementById('clipEndRange');
  startRange.min = 0; startRange.max = clipDuration; startRange.value = 0;
  endRange.min = 0; endRange.max = clipDuration; endRange.value = clipDuration;
  updateClipSliderLabels();
  updateClipRangeFill();
}
function stopClipPreviewTimer(){
  if(clipPreviewTimer){ clearInterval(clipPreviewTimer); clipPreviewTimer = null; }
}
function syncClipPreviewTimer(){
  stopClipPreviewTimer();
  if(clipStart === null || clipEnd === null || !clipYtPlayer) return;
  clipPreviewTimer = setInterval(() => {
    if(!clipYtPlayer || !clipYtPlayer.getCurrentTime) return;
    const current = clipYtPlayer.getCurrentTime();
    const inEndMarkGrace = Date.now() < clipEndMarkGraceUntil;
    if(current < clipStart || (!inEndMarkGrace && current >= clipEnd)){
      const state = clipYtPlayer.getPlayerState && clipYtPlayer.getPlayerState();
      const shouldPlay = state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING || state === YT.PlayerState.ENDED;
      clipYtPlayer.seekTo(clipStart, true);
      if(shouldPlay && clipYtPlayer.playVideo) clipYtPlayer.playVideo();
      else if(state === YT.PlayerState.PAUSED && clipYtPlayer.pauseVideo) clipYtPlayer.pauseVideo();
    }
  }, 250);
}
function loadClipPlayer(onDurationReady){
  const url = document.getElementById('mVideoUrl').value.trim();
  const p = parseYouTube(url);
  if(!p){ setModalMsg('유튜브 링크를 확인해주세요.', 'err'); return; }
  setModalMsg('');
  clipStart = null; clipEnd = null; clipEndMarkGraceUntil = 0; updateClipLabel();
  document.getElementById('clipTools').style.display = 'block';
  document.getElementById('clipPlayerWrap').className = 'clip-player' + (p.isShort ? ' tall' : '');

  // 이전 영상의 duration/슬라이더 상태가 새 영상 로딩 중에 잠깐이라도 남아있지 않도록 즉시 0으로 초기화
  applyClipDuration(0);

  stopClipPreviewTimer();
  if(clipYtPlayer && clipYtPlayer.destroy){ clipYtPlayer.destroy(); clipYtPlayer = null; }
  const mount = document.createElement('div');
  mount.id = 'clipPlayer';
  document.getElementById('clipPlayerWrap').innerHTML = '';
  document.getElementById('clipPlayerWrap').appendChild(mount);

  const build = () => {
    clipYtPlayer = new YT.Player('clipPlayer', {
      videoId: p.id,
      playerVars: { playsinline: 1, enablejsapi: 1, origin: location.origin, rel: 0, cc_load_policy: 0 },
      events: {
        onStateChange: (e) => {
          if(!clipPreviewTimer && modalType === 'vid' && document.getElementById('addModal').classList.contains('active') && [YT.PlayerState.PLAYING, YT.PlayerState.PAUSED, YT.PlayerState.BUFFERING, YT.PlayerState.ENDED].includes(e.data)) syncClipPreviewTimer();
        },
        onReady: (e) => {
          e.target.setVolume(50);
          // onReady 시점의 getDuration()은 (특히 쇼츠에서) 메타데이터가 아직 다 안 실려서
          // 0이거나 실제보다 작은 값을 반환할 수 있다. 두 번 연속 같은 값이 나올 때까지
          // 짧게 재확인해서, duration이 실제로 "확정"된 시점에만 슬라이더에 반영한다.
          let attempts = 0;
          let lastDuration = -1;
          const player = e.target;
          const poll = () => {
            const d = Math.floor(player.getDuration()) || 0;
            attempts++;
            const stable = d > 0 && d === lastDuration;
            if(stable || attempts >= 20){
              applyClipDuration(d);
              if(onDurationReady) onDurationReady(d);
              return;
            }
            lastDuration = d;
            setTimeout(poll, 150);
          };
          poll();
        }
      }
    });
  };
  if(ytReady && window.YT && YT.Player){ build(); }
  else { const iv = setInterval(() => { if(window.YT && YT.Player){ clearInterval(iv); ytReady = true; build(); } }, 200); }
}
function markClipStart(){
  if(!clipYtPlayer || !clipYtPlayer.getCurrentTime) return;
  clipStart = Math.floor(clipYtPlayer.getCurrentTime());
  if(clipEnd !== null && clipEnd <= clipStart) clipEnd = null;
  syncClipSliders();
  updateClipLabel();
  syncClipPreviewTimer();
}
function markClipEnd(){
  if(!clipYtPlayer || !clipYtPlayer.getCurrentTime) return;
  const t = Math.floor(clipYtPlayer.getCurrentTime());
  if(clipStart !== null && t <= clipStart){ setModalMsg('끝은 시작보다 뒤여야 해요.', 'err'); return; }
  clipEnd = t; setModalMsg('');
  // Math.floor로 저장하는 순간 실제 재생 위치가 이미 clipEnd를 넘어 있을 수 있어
  // (절삭 오차 최대 1초 + 폴링 대기 최대 0.25초), 지정 직후 잠깐만 이탈 판정을 건너뛴다.
  clipEndMarkGraceUntil = Date.now() + 1300;
  syncClipSliders();
  updateClipLabel();
  syncClipPreviewTimer();
}
function clearClip(){
  clipStart = null; clipEnd = null; clipEndMarkGraceUntil = 0;
  syncClipSliders();
  updateClipLabel();
  stopClipPreviewTimer();
}
function onClipScrubStart(){
  if(clipYtPlayer && clipYtPlayer.pauseVideo) clipYtPlayer.pauseVideo();
}
function scrubClipPreview(t){
  if(!clipYtPlayer || !clipYtPlayer.seekTo) return;
  const now = Date.now();
  if(now - clipScrubLastSeek < 100) return; // 과도한 seekTo 호출 방지 (약 100ms 스로틀)
  clipScrubLastSeek = now;
  clipYtPlayer.seekTo(t, true);
}
function onClipStartInput(){
  const startRange = document.getElementById('clipStartRange');
  const endRange = document.getElementById('clipEndRange');
  let s = Number(startRange.value);
  const e = Number(endRange.value);
  // 상대(끝) 슬라이더의 값/범위는 건드리지 않고 자기 자신의 값만 넘지 못하게 clamp한다
  // (상대 슬라이더 값을 매 틱마다 재할당하면 "끝쪽이 뻑뻑하다" 버그가 재발한다)
  if(s >= e){ s = Math.max(e - 1, 0); startRange.value = s; }
  clipStart = s; clipEnd = e;
  clipEndMarkGraceUntil = 0;
  updateClipSliderLabels();
  updateClipRangeFill();
  updateClipLabel();
  scrubClipPreview(clipStart);
  syncClipPreviewTimer();
}
function onClipStartChange(){
  if(clipYtPlayer && clipYtPlayer.seekTo) clipYtPlayer.seekTo(clipStart, true);
}
function onClipEndInput(){
  const startRange = document.getElementById('clipStartRange');
  const endRange = document.getElementById('clipEndRange');
  let e = Number(endRange.value);
  const s = Number(startRange.value);
  if(e <= s){ e = Math.min(s + 1, clipDuration); endRange.value = e; }
  clipStart = s; clipEnd = e;
  clipEndMarkGraceUntil = 0;
  updateClipSliderLabels();
  updateClipRangeFill();
  updateClipLabel();
  scrubClipPreview(clipEnd);
  syncClipPreviewTimer();
}
function onClipEndChange(){
  if(clipYtPlayer && clipYtPlayer.seekTo) clipYtPlayer.seekTo(clipEnd, true);
}

function loadImageIntoCropper(file){

function startVideoFlow(text){
  if(modalTag === '맵 지명'){
    setModalMsg('맵 지명은 이미지만 가능합니다.', 'err');
    return;
  }
  const url = text.trim();
  if(!parseYouTube(url)){
    setModalMsg('유효한 유튜브 링크가 아닙니다.', 'err');
    return;
  }
  modalType = 'vid';
  document.getElementById('mVideoUrl').value = url;
  showModalStep('media');
  loadClipPlayer();
}

function startImageFlow(file){
  if(file.type === 'image/gif' || /\.gif$/i.test(file.name || '')){
    setModalMsg('GIF는 아직 지원하지 않습니다.', 'err');
    return;
  }
  if(!file.type.startsWith('image/')){
    setModalMsg('이미지 파일만 사용할 수 있습니다.', 'err');
    return;
  }
  modalType = 'img';
  stopClipPreviewTimer();
  if(clipYtPlayer && clipYtPlayer.destroy){ clipYtPlayer.destroy(); clipYtPlayer = null; }
  showModalStep('media');
  setModalMsg('');
  loadImageIntoCropper(file);
}

async function readAddClipboard(){
  if(!navigator.clipboard || !navigator.clipboard.read){
    showPasteFallback('자동 붙여넣기를 지원하지 않는 브라우저입니다. 여기에 Ctrl+V로 붙여넣거나 업로드를 사용해주세요.');
    return;
  }
  try{
    const items = await navigator.clipboard.read();
    for(const item of items){
      const imageType = item.types.find(type => type.startsWith('image/'));
      if(imageType){ startImageFlow(await item.getType(imageType)); return; }
      if(item.types.includes('text/plain')){
        const text = (await (await item.getType('text/plain')).text()).trim();
        if(text){ startVideoFlow(text); return; }
      }
    }
    showPasteFallback('클립보드가 비어 있습니다. 여기에 Ctrl+V로 붙여넣거나 업로드를 사용해주세요.');
  } catch(err){
    showPasteFallback('클립보드를 읽을 수 없습니다. 여기에 Ctrl+V로 붙여넣거나 업로드를 사용해주세요.');
  }
}

document.addEventListener('paste', function(e){
  if(modalStep !== 'paste' || !document.getElementById('addModal').classList.contains('active')) return;
  const files = e.clipboardData && e.clipboardData.files;
  const image = files && Array.from(files).find(file => file.type.startsWith('image/'));
  if(image){ startImageFlow(image); e.preventDefault(); return; }
  const text = e.clipboardData && e.clipboardData.getData('text/plain');
  if(text){ startVideoFlow(text); e.preventDefault(); }
});

function updateTextCounters(){
  const t = document.getElementById('mTitle');
  const n = document.getElementById('mNote');
  document.getElementById('mTitleCounter').textContent = `${t.value.length}/${t.maxLength}`;
  document.getElementById('mNoteCounter').textContent = `${n.value.length}/${n.maxLength}`;
}

function openAddModal(tag){
  modalTag = tag;
  modalMode = 'add';
  editingItemId = null;
  document.getElementById('mTitle').value = '';
  document.getElementById('mNote').value = '';
  updateTextCounters();
  document.getElementById('mVideoUrl').value = '';
  document.getElementById('mVideoUrl').type = 'hidden';
  document.getElementById('mVideoUrl').readOnly = false;
  document.getElementById('mVideoUrlWrap').style.display = 'none';
  document.getElementById('editHint').style.display = 'none';
  document.getElementById('mImageFile').value = '';
  document.getElementById('pasteFallback').style.display = 'none';
  document.getElementById('modalMsg').textContent = '';
  if(cropper){ cropper.destroy(); cropper = null; }
  document.getElementById('cropperWrap').style.display = 'none';
  document.getElementById('cropperImg').src = '';
  document.getElementById('previewThumbImg').src = '';
  document.getElementById('previewCroppedImg').src = '';
  document.getElementById('previewTimeBadge').textContent = '';

  clipStart = null; clipEnd = null; clipEndMarkGraceUntil = 0;
  applyClipDuration(0);
  document.getElementById('clipTools').style.display = 'none';
  stopClipPreviewTimer();
  if(clipYtPlayer && clipYtPlayer.destroy){ clipYtPlayer.destroy(); clipYtPlayer = null; }
  updateClipLabel();

  const isMapLabel = (tag === '맵 지명');
  document.getElementById('modalTitle').textContent = tag + '에 추가';
  modalType = isMapLabel ? 'img' : 'vid';

  modalTeam = null;
  document.getElementById('mTeam').value = '';

  showModalStep('paste');

  document.getElementById('addModal').classList.add('active');
}
function openEditModal(e, id){
  e.stopPropagation();
  const it = items.find(i => i.id === id);
  if(!it) return;

  modalMode = 'edit';
  editingItemId = id;
  modalTag = it.tag;
  modalType = it.type;

  document.getElementById('mTitle').value = it.title || '';
  document.getElementById('mNote').value = it.note || '';
  updateTextCounters();
  document.getElementById('mImageFile').value = '';
  document.getElementById('pasteFallback').style.display = 'none';
  document.getElementById('modalMsg').textContent = '';
  document.getElementById('previewThumbImg').src = '';
  document.getElementById('previewCroppedImg').src = '';
  document.getElementById('previewTimeBadge').textContent = '';

  // 이미지 수정에서는 새 Cropper를 만들지 않으므로, 추가 모드에서 쓰던 크롭 상태가
  // 남아있지 않은지 명시적으로 비워 저장된 이미지가 실수로 바뀌는 일을 막는다
  if(cropper){ cropper.destroy(); cropper = null; }
  document.getElementById('cropperWrap').style.display = 'none';
  document.getElementById('cropperImg').src = '';

  document.getElementById('modalTitle').textContent = it.tag + ' 항목 수정';
  modalTeam = it.team;
  document.getElementById('mTeam').value = modalTeam || '';
  document.getElementById('editHint').style.display = 'block';

  if(it.type === 'vid'){
    document.getElementById('mVideoUrlWrap').style.display = 'block';
    const urlInput = document.getElementById('mVideoUrl');
    urlInput.type = 'url';
    urlInput.readOnly = true;
    urlInput.value = it.video_url || '';

    showModalStep('media');
    loadClipPlayer((duration) => {
      // 이 콜백은 YouTube duration이 확정된 후 비동기로 실행되므로, 그 사이 모달이
      // 닫히거나 다른 항목의 수정 모달이 열렸다면 지금 세션이 여전히 같은 항목을
      // 수정 중인지 확인한 뒤에만 clipStart/clipEnd를 복원한다
      if(modalMode !== 'edit' || editingItemId !== id) return;
      clipStart = it.clip_start;
      clipEnd = it.clip_end;
      syncClipSliders();
      updateClipLabel();
      syncClipPreviewTimer();
    });
  } else {
    document.getElementById('mVideoUrlWrap').style.display = 'none';
    stopClipPreviewTimer();
    if(clipYtPlayer && clipYtPlayer.destroy){ clipYtPlayer.destroy(); clipYtPlayer = null; }

    // showModalStep()이 savePreviewWrap을 modalType 기준으로 다시 그리므로,
    // 저장된 img_url 주입은 반드시 이 호출 다음에 실행한다
    showModalStep('details');
    document.getElementById('previewCroppedImg').src = it.img_url || '';
  }

  document.getElementById('addModal').classList.add('active');
}
function closeModal(){
  document.getElementById('addModal').classList.remove('active');
  if(cropper){ cropper.destroy(); cropper = null; }
  stopClipPreviewTimer();
  if(clipYtPlayer && clipYtPlayer.destroy){ clipYtPlayer.destroy(); clipYtPlayer = null; }
  modalMode = 'add';
  editingItemId = null;
  document.getElementById('mVideoUrl').type = 'hidden';
  document.getElementById('mVideoUrl').readOnly = false;
  document.getElementById('mVideoUrlWrap').style.display = 'none';
  document.getElementById('editHint').style.display = 'none';
}
function goBackModal(){
  setModalMsg('');
  if(modalMode === 'edit'){
    // 수정 모드에는 되돌아갈 유효한 paste 단계가 없다 — UI에서 이미 뒤로 버튼을
    // 숨기지만, 방어적으로도 paste로는 절대 이동하지 않는다
    showModalStep(modalStep === 'details' ? 'media' : modalStep);
    return;
  }
  showModalStep(modalStep === 'details' ? 'media' : 'paste');
}
function advanceAddModal(){
  if(modalStep === 'details' || modalTag === '맵 지명'){ submitItem(); return; }
  if(modalType === 'vid' && document.getElementById('clipTools').style.display === 'none'){
    setModalMsg('유튜브 영상을 불러오지 못했습니다.', 'err'); return;
  }
  if(modalType === 'img' && !cropper){ setModalMsg('이미지를 선택하거나 붙여넣어주세요.', 'err'); return; }
  setModalMsg('');
  showModalStep('details');
}
function setModalMsg(t, cls){
  const el = document.getElementById('modalMsg');
  el.className = 'msg-modal' + (cls ? (' ' + cls) : '');
  el.textContent = t;
}
async function submitItem(){
  const savedTeam = modalTeam || 'none';

  if(modalMode === 'edit'){
    const original = items.find(i => i.id === editingItemId);
    const isMapLabel = (modalTag === '맵 지명');
    const title = isMapLabel ? (original ? original.title : '맵 전체 지명') : document.getElementById('mTitle').value.trim();
    const note = isMapLabel ? (original ? (original.note || '') : '') : document.getElementById('mNote').value.trim();
    if(!isMapLabel && !title){ setModalMsg('제목을 입력해주세요.', 'err'); return; }

    const saveBtn = document.getElementById('modalSaveBtn');
    saveBtn.disabled = true;
    setModalMsg('저장 중...');

    const payload = { title, note: note || null, team: savedTeam };
    if(modalType === 'vid'){ payload.clip_start = clipStart; payload.clip_end = clipEnd; }

    const { error } = await sb.from('items').update(payload).eq('id', editingItemId);
    if(error){ setModalMsg('저장 실패: ' + error.message, 'err'); saveBtn.disabled = false; return; }

    setModalMsg('수정 완료!', 'ok');
    setTimeout(async () => { closeModal(); saveBtn.disabled = false; await loadAll(); renderCards(); }, 500);
    return;
  }

  const isMapLabel = (modalTag === '맵 지명');
  const title = isMapLabel ? '맵 전체 지명' : document.getElementById('mTitle').value.trim();
  const note = isMapLabel ? '' : document.getElementById('mNote').value.trim();
  if(!isMapLabel && !title){ setModalMsg('제목을 입력해주세요.', 'err'); return; }

  const saveBtn = document.getElementById('modalSaveBtn');
  saveBtn.disabled = true;
  setModalMsg('저장 중...');

  if(modalType === 'vid'){
    const url = document.getElementById('mVideoUrl').value.trim();
    const p = parseYouTube(url);
    if(!p){ setModalMsg('유튜브 링크를 확인해주세요.', 'err'); saveBtn.disabled = false; return; }

    const { error } = await sb.from('items').insert({
      map_id: currentMap, team: savedTeam, type: 'vid', tag: modalTag,
      title, note: note || null, video_url: url, clip_start: clipStart, clip_end: clipEnd
    });
    if(error){ setModalMsg('저장 실패: ' + error.message, 'err'); saveBtn.disabled = false; return; }
  } else {
    if(!cropper){ setModalMsg('이미지를 선택하거나 붙여넣어주세요.', 'err'); saveBtn.disabled = false; return; }

    setModalMsg('업로드 중...');
    const blob = await new Promise(res => cropper.getCroppedCanvas().toBlob(res, 'image/jpeg', 0.92));
    const path = `items/${Date.now()}.jpg`;
    const { error: upErr } = await sb.storage.from('media').upload(path, blob, { contentType: 'image/jpeg' });
    if(upErr){ setModalMsg('업로드 실패: ' + upErr.message, 'err'); saveBtn.disabled = false; return; }
    const { data: pub } = sb.storage.from('media').getPublicUrl(path);

    setModalMsg('저장 중...');
    const { error } = await sb.from('items').insert({
      map_id: currentMap, team: savedTeam, type: 'img', tag: modalTag,
      title, note: note || null, img_url: pub.publicUrl, video_url: null, clip_start: null, clip_end: null
    });
    if(error){ setModalMsg('저장 실패: ' + error.message, 'err'); saveBtn.disabled = false; return; }
  }

  setModalMsg('추가 완료!', 'ok');
  setTimeout(async () => { closeModal(); saveBtn.disabled = false; await loadAll(); renderCards(); }, 500);
}

let editMode = false;
function toggleEditMode(){
  editMode = !editMode;
  const btn = document.getElementById('editModeBtn');
  if(btn){
    btn.classList.toggle('on', editMode);
    btn.textContent = editMode ? '편집모드 ON' : '편집모드';
  }
  renderMapGrid();
  if(document.getElementById('viewDetail').classList.contains('active')) renderCards();
}

async function renderAuthArea(session){
  const userId = session && session.user.id;
  const previousUserId = currentSession && currentSession.user.id;
  currentSession = session;
  if(previousUserId !== userId) favoritePending.clear();
  await loadFavorites();
  if((currentSession && currentSession.user.id) !== userId) return;
  const el = document.getElementById('authArea');
  if(session){
    const nickname = session.user.user_metadata.full_name || session.user.user_metadata.name || '사용자';
    let isAdmin = false;
    try {
      const { data } = await sb.from('admins').select('user_id').eq('user_id', session.user.id).maybeSingle();
      isAdmin = !!data;
    } catch(e){
      isAdmin = false;
    }

    el.innerHTML = `
      <span class="mono" style="font-size:12px;color:var(--text);">${nickname}</span>
      ${isAdmin ? '<span class="admin-badge">관리자</span>' : ''}
      ${isAdmin ? '<button id="editModeBtn" class="editmode-btn">편집모드</button>' : ''}
      <button id="logoutBtn" class="discord-btn">로그아웃</button>
    `;
    document.getElementById('logoutBtn').onclick = async () => {
      await sb.auth.signOut();
    };
    if(isAdmin){
      document.getElementById('editModeBtn').onclick = toggleEditMode;
    }
  } else {
    editMode = false;
    el.innerHTML = `<button id="discordLoginBtn" class="discord-btn">디스코드로 로그인</button>`;
    document.getElementById('discordLoginBtn').onclick = discordLogin;
  }
  rerenderCurrentView();
}

async function initAuth(){
  const { data: { session } } = await sb.auth.getSession();
  await renderAuthArea(session);
  sb.auth.onAuthStateChange((event, session) => {
    renderAuthArea(session);
  });
}

initAuth();
loadAll();
</script>

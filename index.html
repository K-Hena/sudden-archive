<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>서든 아카이브</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon-180.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Gothic+A1:wght@700;900&display=swap');

@font-face {
  font-family: 'Paperlogy';
  font-weight: 800;
  font-style: normal;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy-8ExtraBold.woff2') format('woff2'),
       url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');
}
@font-face {
  font-family: 'Paperlogy';
  font-weight: 900;
  font-style: normal;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy-9Black.woff2') format('woff2'),
       url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
}

:root{
  --bg:#0A0C0F;
  --panel:#14171C;
  --panel-hi:#1B1F26;
  --line:#252A31;
  --text:#E6E9ED;
  --muted:#7E8792;
  --red:#E4364A;
  --red-dim:#3A1A20;
  --blue:#3B7DE8;
  --blue-dim:#152436;
  --amber:#F2A93B;
  --edit-accent:#FF5C9E;
  --edit-accent-ink:#2A0A18;
  --green:#4CD97B;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding-bottom:60px;
}
.mono{font-family:'JetBrains Mono',monospace;}
.cut-sm{clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);}

header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 32px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#0D1013,#0A0C0F);
}
.brand{display:flex;align-items:center;gap:12px;}
.reticle{width:26px;height:26px;position:relative;border:2px solid #FFFFFF;border-radius:50%;}
.reticle::before,.reticle::after{content:'';position:absolute;background:#FFFFFF;}
.reticle::before{width:2px;height:10px;left:11px;top:-6px;}
.reticle::after{width:10px;height:2px;top:11px;left:-6px;}
.brand h1{font-family:'Paperlogy',sans-serif;font-weight:800;font-size:26px;letter-spacing:0;line-height:1.4;}
.brand span{color:var(--red);}
.status{font-size:12px;color:var(--muted);letter-spacing:0.08em;display:flex;align-items:center;gap:18px;}
.status b{color:var(--text);}

.subbar{
  padding:14px 32px;display:flex;align-items:center;gap:10px;
  font-size:12px;color:var(--muted);letter-spacing:0.06em;border-bottom:1px solid var(--line);
}
.subbar b{color:var(--text);cursor:pointer;}
.subbar .sep{color:#3A4048;}

.view{padding:28px 32px;display:none;}
.view.active{display:block;}
.section-label{
  font-size:12px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--line);}

.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.map-tile{
  background:var(--panel);border:1px solid var(--line);height:220px;cursor:pointer;
  position:relative;overflow:hidden;transition:border-color .15s, transform .15s;
}
.map-tile:hover{border-color:#FFFFFF;transform:translateY(-2px);}
.map-thumb{height:150px;position:relative;display:flex;align-items:center;justify-content:center;}
.map-thumb .no-img{font-family:'JetBrains Mono',monospace;font-size:10px;color:#3A4048;letter-spacing:0.06em;}
.map-tile:nth-child(6n+1) .map-thumb{background:linear-gradient(135deg,#26313F,#111820);}
.map-tile:nth-child(6n+2) .map-thumb{background:linear-gradient(135deg,#2E1F1F,#150F10);}
.map-tile:nth-child(6n+3) .map-thumb{background:linear-gradient(135deg,#1F2A24,#0F1512);}
.map-tile:nth-child(6n+4) .map-thumb{background:linear-gradient(135deg,#2A2233,#131019);}
.map-tile:nth-child(6n+5) .map-thumb{background:linear-gradient(135deg,#332A1B,#171208);}
.map-tile:nth-child(6n+6) .map-thumb{background:linear-gradient(135deg,#1E2733,#0D1319);}
.map-tile .info{padding:12px 14px;}
.map-tile .name{font-family:'Paperlogy',sans-serif;font-weight:800;font-size:20px;}
.map-tile .count{font-size:11px;color:var(--muted);margin-top:2px;}

.detail-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:20px;}
.detail-title{font-family:'Paperlogy',sans-serif;font-weight:800;font-size:26px;letter-spacing:0;color:var(--text);}
.detail-title span{color:var(--muted);font-size:14px;font-weight:500;font-family:'Inter';margin-left:10px;}

.team-toggle{display:flex;border:1px solid var(--line);}
.team-toggle button{
  font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:0.08em;
  background:var(--panel);color:var(--muted);border:none;padding:9px 22px;cursor:pointer;font-size:13px;
  border-right:1px solid var(--line);
}
.team-toggle button:last-child{border-right:none;}
.team-toggle button.on-red{color:var(--red);background:var(--red-dim);}
.team-toggle button.on-blue{color:var(--blue);background:var(--blue-dim);}

.tag-section{margin-bottom:34px;}
.tag-section .section-label{margin-bottom:16px;}
.tag-section .section-label b{
  color:var(--red);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;letter-spacing:0.1em;
}

.card-grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.card{background:var(--panel);border:1px solid var(--line);cursor:pointer;transition:border-color .15s;position:relative;}
.card:hover{border-color:#FFFFFF;}
.card .card-del{
  position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(6,7,9,.8);
  display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);
  cursor:pointer;opacity:0;transition:opacity .15s;z-index:2;
}
.card:hover .card-del{opacity:1;}
.card .card-del:hover{color:var(--red);}
.thumb{
  height:130px;position:relative;background:linear-gradient(135deg,#1A1E24,#0F1216);
  display:flex;align-items:center;justify-content:center;
}
.thumb .badge{
  position:absolute;top:8px;left:8px;font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:0.05em;padding:3px 7px;text-transform:uppercase;
}
.badge.vid{background:var(--red);color:#fff;}
.badge.img{background:var(--blue);color:#fff;}
.badge.short{background:#8B5CF6;color:#fff;}
.playicon{
  width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;color:#fff;
}
.playicon::before{content:'';border-left:12px solid #fff;border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:3px;}
.card .meta{padding:10px 12px;}
.card .title{font-size:13.5px;font-weight:500;margin-bottom:6px;}
.card .note{font-size:11.5px;color:var(--muted);line-height:1.5;}

.back-btn{
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.06em;
  color:var(--muted);background:none;border:1px solid var(--line);padding:8px 16px;cursor:pointer;margin-bottom:18px;
}
.back-btn:hover{color:#FFFFFF;border-color:#FFFFFF;}

.overlay{
  display:none;position:fixed;inset:0;background:rgba(6,7,9,.92);z-index:50;
  align-items:center;justify-content:center;padding:40px;
}
.overlay.active{display:flex;}
.overlay-box{display:flex;flex-direction:column;align-items:center;}
.overlay-media{
  background:#000;border:1px solid var(--line);overflow:hidden;position:relative;
  display:flex;align-items:center;justify-content:center;color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-size:12px;
}
.overlay-media.wide{width:min(880px,90vw);aspect-ratio:16/9;}
.overlay-media.tall{height:min(80vh,720px);aspect-ratio:9/16;}
#overlayMediaContent{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.overlay-media iframe,.overlay-media img{width:100%;height:100%;display:block;object-fit:contain;border:0;}
.overlay-playpause{
  position:absolute;bottom:14px;left:14px;z-index:5;width:40px;height:40px;border-radius:50%;
  background:rgba(6,7,9,.75);color:#fff;border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;
}
.overlay-playpause:hover{border-color:var(--edit-accent);color:var(--edit-accent);}
.overlay-meta{width:100%;max-width:880px;padding:14px 2px;display:flex;justify-content:space-between;align-items:flex-start;}
.overlay-meta .note{font-size:12.5px;color:var(--muted);max-width:70%;line-height:1.5;}
.overlay-close{
  color:var(--muted);cursor:pointer;font-family:'JetBrains Mono';font-size:12px;
  border:1px solid var(--line);padding:6px 12px;
}
.overlay-close:hover{color:var(--red);border-color:var(--red);}
.loading{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);padding:40px;text-align:center;}

.site-footer{
  text-align:center;padding:24px 32px;margin-top:20px;
  border-top:1px solid var(--line);
  font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A515B;letter-spacing:0.03em;
}
.discord-btn{
  background:var(--red-dim);
  color:var(--red);
  border:1px solid var(--red);
  border-radius:0;
  padding:7px 16px;
  font-family:'Rajdhani',sans-serif;
  font-weight:600;
  font-size:12px;
  letter-spacing:0.06em;
  cursor:pointer;
}
.discord-btn:hover{background:var(--red);color:#fff;}
.admin-badge{
  background:var(--red-dim);
  color:var(--red);
  border:1px solid var(--red);
  padding:3px 8px;
  font-family:'Rajdhani',sans-serif;
  font-weight:700;
  font-size:10px;
  letter-spacing:0.08em;
}
.editmode-btn{
  background:none;
  color:var(--muted);
  border:1px solid var(--line);
  border-radius:0;
  padding:7px 16px;
  font-family:'Rajdhani',sans-serif;
  font-weight:600;
  font-size:12px;
  letter-spacing:0.06em;
  cursor:pointer;
}
.editmode-btn:hover{border-color:var(--edit-accent);color:var(--edit-accent);}
.editmode-btn.on{
  background:var(--edit-accent);
  color:var(--edit-accent-ink);
  border-color:var(--edit-accent);
}
.map-tile .tile-actions{position:absolute;top:6px;right:6px;display:flex;gap:5px;opacity:0;transition:opacity .15s;z-index:2;}
.map-tile:hover .tile-actions{opacity:1;}
.tile-actions span{width:24px;height:24px;background:rgba(6,7,9,.8);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);cursor:pointer;}
.tile-actions span:hover{color:var(--edit-accent);}
.tile-actions span.del:hover{color:var(--red);}
.add-tile{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;border:1px dashed var(--line);color:var(--muted);cursor:pointer;min-height:130px;}
.add-tile:hover{color:var(--edit-accent);border-color:var(--edit-accent);}
.add-tile .plus{font-size:28px;font-family:'Rajdhani';}
.add-tile .label{font-size:12px;letter-spacing:0.06em;}

.modal{display:none;position:fixed;inset:0;background:rgba(6,7,9,.9);z-index:60;align-items:center;justify-content:center;padding:30px;overflow:auto;}
.modal.active{display:flex;}
.modal-box{background:var(--panel);border:1px solid var(--line);width:min(560px,95vw);max-height:90vh;overflow:auto;}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;letter-spacing:0.04em;}
.modal-head .x{cursor:pointer;color:var(--muted);font-family:'JetBrains Mono';}
.modal-head .x:hover{color:var(--red);}
.modal-body{padding:20px;}
.modal-body label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:0.03em;}
.modal-body input[type=text], .modal-body input[type=url], .modal-body textarea{width:100%;background:#0D1013;border:1px solid var(--line);color:var(--text);padding:9px 10px;font-family:'Inter',sans-serif;font-size:13px;margin-bottom:14px;}
.modal-body textarea{resize:vertical;min-height:44px;}
.modal-body input[type=file]{width:100%;background:#0D1013;border:1px solid var(--line);color:var(--text);padding:9px 10px;font-family:'Inter',sans-serif;font-size:12px;margin-bottom:10px;}
.type-toggle{display:flex;gap:0;border:1px solid var(--line);margin-bottom:16px;}
.type-toggle button{flex:1;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;background:#0D1013;color:var(--muted);border:none;padding:10px;cursor:pointer;border-right:1px solid var(--line);}
.type-toggle button:last-child{border-right:none;}
.type-toggle button.on{background:var(--edit-accent);color:var(--edit-accent-ink);}
.cropper-wrap{max-height:340px;margin-bottom:14px;display:none;}
.cropper-wrap img{max-width:100%;display:block;}
.clip-tools{margin-bottom:14px;}
.clip-player{width:100%;aspect-ratio:16/9;background:#000;margin-bottom:10px;}
.clip-player.tall{aspect-ratio:9/16;max-height:360px;margin:0 auto 10px;}
.clip-player iframe{width:100%;height:100%;border:0;}
.clip-sliders{margin-bottom:14px;}
.clip-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:0.03em;}
.clip-labels b{color:var(--edit-accent);font-family:'JetBrains Mono',monospace;font-weight:500;}
.clip-range-slider{position:relative;height:28px;}
.clip-range-track{position:absolute;top:50%;left:0;right:0;height:4px;transform:translateY(-50%);background:#0D1013;border:1px solid var(--line);}
.clip-range-fill{position:absolute;top:50%;height:4px;transform:translateY(-50%);background:var(--edit-accent);pointer-events:none;}
.clip-range-input{position:absolute;top:0;left:0;width:100%;height:28px;margin:0;padding:0;-webkit-appearance:none;appearance:none;background:none;pointer-events:none;}
.clip-range-input::-webkit-slider-runnable-track{background:transparent;height:28px;}
.clip-range-input::-moz-range-track{background:transparent;height:28px;border:none;}
.clip-range-input::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;pointer-events:auto;width:16px;height:16px;margin-top:6px;border-radius:50%;background:var(--edit-accent);border:2px solid #0A0C0F;cursor:pointer;}
.clip-range-input::-moz-range-thumb{pointer-events:auto;width:16px;height:16px;border-radius:50%;background:var(--edit-accent);border:2px solid #0A0C0F;cursor:pointer;}
.clip-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
.clip-btns button{font-family:'JetBrains Mono',monospace;font-size:11px;background:#0D1013;color:var(--text);border:1px solid var(--line);padding:8px 12px;cursor:pointer;}
.clip-btns button:hover{border-color:var(--edit-accent);color:var(--edit-accent);}
.clip-range{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto;}
.clip-range b{color:var(--edit-accent);}
.hint{font-size:10.5px;color:#5A626D;margin-bottom:14px;line-height:1.5;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;}
.btn-primary{font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:0.06em;font-size:13px;background:var(--edit-accent);color:var(--edit-accent-ink);border:none;padding:10px 22px;cursor:pointer;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-ghost{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;background:none;color:var(--muted);border:1px solid var(--line);padding:10px 18px;cursor:pointer;}
.msg-modal{font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:8px;min-height:14px;}
.msg-modal.err{color:var(--red);}
.msg-modal.ok{color:var(--green);}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="reticle"></div>
    <h1>서든 <span>아카이브</span></h1>
  </div>
  <div class="status">
    <span class="mono"><b id="clipCount">-</b>&nbsp;CLIPS</span>
    <span class="mono"><b id="tipCount">-</b>&nbsp;TIPS</span>
    <span id="authArea" style="display:flex;align-items:center;gap:10px;"></span>
  </div>
</header>

<div class="subbar">
  <b onclick="showMapGrid()">전체 맵</b>
  <span class="sep" id="crumbSep" style="display:none">/</span>
  <b id="crumbMap" style="display:none"></b>
</div>

<div class="view active" id="viewGrid">
  <div class="section-label">맵 선택</div>
  <div class="map-grid" id="mapGrid"><div class="loading">불러오는 중...</div></div>
</div>

<div class="view" id="viewDetail">
  <button class="back-btn" onclick="showMapGrid()">← 전체 맵으로</button>
  <div class="detail-head">
    <div class="detail-title" id="detailTitle">맵명 <span id="detailCount"></span></div>
    <div class="team-toggle">
      <button id="btnRed" onclick="setTeam('red')">RED</button>
      <button id="btnBlue" onclick="setTeam('blue')">BLUE</button>
    </div>
  </div>
  <div id="cardGrid"></div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-media wide" id="overlayMedia">
      <div id="overlayMediaContent">MEDIA PREVIEW</div>
      <span class="overlay-playpause" id="overlayPlayPause" onclick="toggleOverlayPlay()" style="display:none;">⏸</span>
    </div>
    <div class="overlay-meta">
      <div class="note" id="overlayNote"></div>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="btn-ghost" id="overlayFullBtn" onclick="showFullVideo()" style="display:none;">전체 영상 보기</button>
        <div class="overlay-close" onclick="closeOverlay()">닫기 ✕</div>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="addModal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalTitle">항목 추가</h3>
      <span class="x" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body">
      <div class="type-toggle" id="typeToggle">
        <button id="ttVid" onclick="setModalType('vid')">🎬 영상</button>
        <button id="ttImg" onclick="setModalType('img')">🖼 이미지</button>
      </div>

      <div id="titleWrap">
        <label>제목</label>
        <input type="text" id="mTitle" placeholder="예: 박스 뒤 몸샷 위폭">
        <label>설명 (선택)</label>
        <textarea id="mNote" placeholder="비워둬도 됨"></textarea>
      </div>

      <div id="videoWrap">
        <label>유튜브 링크 (풀영상 / 쇼츠 모두 가능)</label>
        <input type="url" id="mVideoUrl" placeholder="https://youtube.com/watch?v=... 또는 /shorts/...">
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <button class="btn-ghost" onclick="loadClipPlayer()">불러오기</button>
        </div>

        <div class="clip-tools" id="clipTools" style="display:none;">
          <div class="clip-player" id="clipPlayerWrap"><div id="clipPlayer"></div></div>
          <div class="clip-sliders" id="clipSliders">
            <div class="clip-labels">
              <span>시작 <b id="clipStartLabel">0:00</b></span>
              <span>끝 <b id="clipEndLabel">0:00</b></span>
            </div>
            <div class="clip-range-slider" id="clipRangeSlider">
              <div class="clip-range-track"></div>
              <div class="clip-range-fill" id="clipRangeFill"></div>
              <input type="range" class="clip-range-input" id="clipStartRange" min="0" max="0" step="1" value="0"
                oninput="onClipStartInput()" onchange="onClipStartChange()" onpointerdown="onClipScrubStart()">
              <input type="range" class="clip-range-input" id="clipEndRange" min="0" max="0" step="1" value="0"
                oninput="onClipEndInput()" onchange="onClipEndChange()" onpointerdown="onClipScrubStart()">
            </div>
          </div>
          <div class="clip-btns">
            <button onclick="markClipStart()">⏮ 지금부터 (시작)</button>

async function loadAll(){
  if(!sb) return; // 위에서 초기화 실패한 경우 여기서 중단
  try {
    const { data: mapRows, error: mapErr } = await sb

      .from('items').select('*');

      document.getElementById('mapGrid').innerHTML =
        `<div class="loading">데이터를 불러오지 못했어요.<br>${(mapErr||itemErr).message}</div>`;
      return;
    }
    maps = mapRows;
    items = itemRows;
    document.getElementById('clipCount').textContent = items.filter(i=>i.type==='vid').length;
    document.getElementById('tipCount').textContent = items.filter(i=>i.tag==='팁').length;

    document.getElementById('mapGrid').innerHTML =
      `<div class="loading">요청 중 오류가 발생했어요.<br>${e.message}</div>`;

}

function renderMapGrid(){

async function addMap(){
  const name = prompt('추가할 맵 이름을 입력하세요');
  if(!name || !name.trim()) return;
  if(maps.some(m => m.name === name.trim())){ alert('이미 있는 맵 이름이에요.'); return; }
  const maxOrder = maps.reduce((mx,m) => Math.max(mx, m.sort_order||0), 0);
  const { error } = await sb.from('maps').insert({ name: name.trim(), sort_order: maxOrder+1 });
  if(error){ alert('추가 실패: ' + error.message); return; }
  await loadAll();
}
async function renameMap(e,id,oldName){
  e.stopPropagation();
  const name = prompt('새 맵 이름', oldName);
  if(!name || !name.trim() || name.trim() === oldName) return;
  const { error } = await sb.from('maps').update({ name: name.trim() }).eq('id', id);
  if(error){ alert('변경 실패: ' + error.message); return; }
  await loadAll();
}
async function deleteMap(e,id,name){
  e.stopPropagation();
  const count = items.filter(i => i.map_id === id).length;
  const warn = count > 0
    ? `⚠️ "${name}" 맵을 삭제하면 이 맵에 등록된 ${count}개 항목(영상·이미지)도 함께 영구 삭제됩니다.\n\n정말 삭제하시겠어요? 되돌릴 수 없어요.`
    : `⚠️ "${name}" 맵을 삭제하시겠어요? 되돌릴 수 없어요.`;
  if(!confirm(warn)) return;
  const { error } = await sb.from('maps').delete().eq('id', id);
  if(error){ alert('삭제 실패: ' + error.message); return; }
  await loadAll();
}

async function deleteItem(e,id){

function parseYouTube(url){
  if(!url) return null;
  const short = url.match(/shorts\/([A-Za-z0-9_-]{6,})/);
  if(short) return { id: short[1], isShort: true };
  const normal = url.match(/(?:youtu\.be\/|v=)([A-Za-z0-9_-]{6,})/);
  if(normal) return { id: normal[1], isShort: false };
  return null;
}
function ytThumb(url){
  const p = parseYouTube(url);
  return p ? `https://img.youtube.com/vi/${p.id}/hqdefault.jpg` : '';
}

function renderCards(){
  const filtered = items.filter(i => i.map_id === currentMap && i.team === currentTeam);
  document.getElementById('detailCount').textContent = '(' + filtered.length + ')';

  const groups = {};

    groups[it.tag].push(it);

  tagOrder.forEach(t => { if(!groups[t]) groups[t] = []; });

  const sortedTags = Object.keys(groups)
    .filter(t => editMode || groups[t].length > 0)
    .sort((a, b) => {
      const ai = tagOrder.indexOf(a), bi = tagOrder.indexOf(b);
      return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);

  const container = document.getElementById('cardGrid');

      <div class="card-grid-inner">
        ${list.map(it => {
          const p = it.type === 'vid' ? parseYouTube(it.video_url) : null;
          const thumbUrl = it.type === 'vid' ? ytThumb(it.video_url) : it.img_url;

            <div class="thumb" style="${thumbUrl ? `background-image:url('${thumbUrl}');background-size:cover;background-position:center;` : ''}">
              <div class="badge ${it.type}">${it.type==='vid' ? '영상' : '이미지'}</div>
              ${shortBadge}
              ${thumbUrl
                ? (it.type==='vid' ? '<div class="playicon"></div>' : '')
                : `<span class="mono" style="font-size:10px;color:#3A4048;">${it.type==='vid' ? '아직 등록된 영상 없음' : '아직 등록된 이미지 없음'}</span>`
              }
            </div>
            ${isMapLabel ? '' : `
            <div class="meta">
              <div class="title">${it.title}</div>
              ${it.note ? `<div class="note">${it.note}</div>` : ''}
            </div>`}
          </div>
        `;}).join('') + addTileHtml}
      </div>
    </div>
  `;
  }).join('') || `<div class="mono" style="color:var(--muted);font-size:12px;">이 진영에 등록된 항목이 없어요.</div>`;

let clipTimer = null;
let overlayVideoId = null;
let overlayHasClip = false;
function openOverlay(id){
  const it = items.find(i => i.id === id);
  const media = document.getElementById('overlayMediaContent');
  const playPauseBtn = document.getElementById('overlayPlayPause');
  const fullBtn = document.getElementById('overlayFullBtn');

  // 이전 플레이어/타이머 정리
  if(clipTimer){ clearInterval(clipTimer); clipTimer = null; }
  if(ytPlayer && ytPlayer.destroy){ ytPlayer.destroy(); ytPlayer = null; }
  playPauseBtn.style.display = 'none';
  fullBtn.style.display = 'none';
  overlayVideoId = null;
  overlayHasClip = false;

  if(it.type === 'vid' && it.video_url){
    const p = parseYouTube(it.video_url);
    if(p){
      document.getElementById('overlayMedia').className = 'overlay-media ' + (p.isShort ? 'tall' : 'wide');
      const hasClip = (it.clip_start != null || it.clip_end != null);
      overlayHasClip = hasClip;
      overlayVideoId = p.id;

      if(hasClip){
        // 클립 구간이 있으면 JS 플레이어로 제어 (쇼츠도 구간 적용됨), 컨트롤바는 숨겨서 구간 밖으로 못 나가게 함
        const mount = document.createElement('div');
        media.innerHTML = '';
        media.appendChild(mount);
        const start = it.clip_start != null ? it.clip_start : 0;
        const end = it.clip_end != null ? it.clip_end : null;
        const build = () => {
          ytPlayer = new YT.Player(mount, {
            videoId: p.id,
            playerVars: { autoplay:1, playsinline:1, controls:0, rel:0, start:start, origin:location.origin, cc_load_policy:0 },
            events: {
              onReady: (e) => { e.target.setVolume(50); e.target.seekTo(start, true); e.target.playVideo(); },
              onStateChange: (e) => {
                if(e.data === YT.PlayerState.PLAYING){
                  playPauseBtn.textContent = '⏸';
                  if(end != null){
                    if(clipTimer) clearInterval(clipTimer);
                    clipTimer = setInterval(() => {
                      if(ytPlayer && ytPlayer.getCurrentTime && ytPlayer.getCurrentTime() >= end){
                        ytPlayer.seekTo(start, true); // 구간 반복
                      }
                    }, 250);
                  }
                } else if(e.data === YT.PlayerState.PAUSED){
                  playPauseBtn.textContent = '▶';
                }
              }
            }
          });
        };
        if(ytReady && window.YT && YT.Player){ build(); }
        else { const iv = setInterval(() => { if(window.YT && YT.Player){ clearInterval(iv); ytReady=true; build(); } }, 200); }

        playPauseBtn.textContent = '⏸';
        playPauseBtn.style.display = 'flex';
        fullBtn.style.display = 'inline-block';
      } else {
        // 구간 없으면 일반 임베드
        media.innerHTML = `<iframe src="https://www.youtube.com/embed/${p.id}?rel=0&autoplay=1&playsinline=1&cc_load_policy=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      }
    } else {
      document.getElementById('overlayMedia').className = 'overlay-media wide';
      media.innerHTML = `<span>유튜브 링크 형식을 확인해주세요</span>`;
    }
  } else if(it.type === 'img' && it.img_url){
    document.getElementById('overlayMedia').className = 'overlay-media wide';
    media.innerHTML = `<img src="${it.img_url}">`;
  } else {
    document.getElementById('overlayMedia').className = 'overlay-media wide';
    media.innerHTML = it.type==='vid' ? '<span>아직 등록된 영상이 없어요</span>' : '<span>아직 등록된 이미지가 없어요</span>';
  }
  document.getElementById('overlayNote').textContent = it.note ? it.title + ' — ' + it.note : it.title;
  document.getElementById('overlay').classList.add('active');
}
function toggleOverlayPlay(){
  if(!ytPlayer || !ytPlayer.getPlayerState) return;
  if(ytPlayer.getPlayerState() === YT.PlayerState.PLAYING){
    ytPlayer.pauseVideo();
  } else {
    ytPlayer.playVideo();
  }
}
function showFullVideo(){
  if(!overlayVideoId || !overlayHasClip) return;
  const resumeAt = (ytPlayer && ytPlayer.getCurrentTime) ? ytPlayer.getCurrentTime() : 0;
  if(clipTimer){ clearInterval(clipTimer); clipTimer = null; }
  if(ytPlayer && ytPlayer.destroy){ ytPlayer.destroy(); ytPlayer = null; }

  const media = document.getElementById('overlayMediaContent');
  const mount = document.createElement('div');
  media.innerHTML = '';
  media.appendChild(mount);

  const videoId = overlayVideoId;
  const build = () => {
    ytPlayer = new YT.Player(mount, {
      videoId: videoId,
      playerVars: { autoplay:1, playsinline:1, controls:1, rel:0, start: Math.floor(resumeAt), origin: location.origin, cc_load_policy:0 },
      events: {
        onReady: (e) => { e.target.setVolume(50); e.target.seekTo(resumeAt, true); e.target.playVideo(); }
      }
    });
  };
  if(ytReady && window.YT && YT.Player){ build(); }
  else { const iv = setInterval(() => { if(window.YT && YT.Player){ clearInterval(iv); ytReady=true; build(); } }, 200); }

  overlayHasClip = false;
  document.getElementById('overlayPlayPause').style.display = 'none';
  document.getElementById('overlayFullBtn').style.display = 'none';
}
function closeOverlay(){
  if(clipTimer){ clearInterval(clipTimer); clipTimer = null; }
  if(ytPlayer && ytPlayer.destroy){ ytPlayer.destroy(); ytPlayer = null; }
  document.getElementById('overlayMediaContent').innerHTML = '';
  document.getElementById('overlayPlayPause').style.display = 'none';
  document.getElementById('overlayFullBtn').style.display = 'none';
  overlayVideoId = null;
  overlayHasClip = false;
  document.getElementById('overlay').classList.remove('active');
}

let modalTag = null;
let modalType = 'vid';
let cropper = null;
let clipStart = null, clipEnd = null, clipYtPlayer = null;
let clipDuration = 0;
let clipScrubLastSeek = 0;

function fmtClip(s){
  if(s === null) return '—';
  const m = Math.floor(s / 60), ss = Math.floor(s % 60);
  return `${m}:${String(ss).padStart(2, '0')}`;
}
function updateClipLabel(){
  const el = document.getElementById('clipRange');
  if(clipStart === null && clipEnd === null){ el.innerHTML = '전체 재생'; return; }
  el.innerHTML = `구간 <b>${fmtClip(clipStart)}</b> ~ <b>${fmtClip(clipEnd)}</b>`;
}
function updateClipSliderLabels(){
  document.getElementById('clipStartLabel').textContent = fmtClip(Number(document.getElementById('clipStartRange').value));
  document.getElementById('clipEndLabel').textContent = fmtClip(Number(document.getElementById('clipEndRange').value));
}
function updateClipRangeFill(){
  const fill = document.getElementById('clipRangeFill');
  if(clipDuration <= 0){ fill.style.left = '0%'; fill.style.width = '0%'; return; }
  const s = Number(document.getElementById('clipStartRange').value);
  const e = Number(document.getElementById('clipEndRange').value);
  const startFrac = s / clipDuration;
  const endFrac = Math.max(e, s) / clipDuration;
  // 네이티브 range 손잡이는 트랙 전체 폭이 아니라 (트랙폭 - 손잡이폭)만큼만 이동하고,
  // 손잡이 중심은 항상 손잡이 반지름(8px, thumb width 16px의 절반)만큼 안쪽에서 시작한다.
  // 퍼센트를 트랙 폭 그대로 써서 계산하면 채움 바가 실제 손잡이 위치보다 바깥으로 튀어나온다.
  fill.style.left = `calc(8px + (100% - 16px) * ${startFrac})`;
  fill.style.width = `calc((100% - 16px) * ${Math.max(endFrac - startFrac, 0)})`;
}
// 시작/끝 슬라이더가 서로 넘나들지 못하도록 각자의 min/max로 상호 배타적 범위를 걸어둔다.
// (반대쪽 슬라이더의 .value를 직접 밀어내는 대신 자기 자신의 네이티브 범위로만 막아서,
//  서로의 값을 계속 되돌려쓰는 일이 없게 한다 — "끝쪽이 뻑뻑하다" 버그의 원인이었다)
function updateClipSliderBounds(){
  const startRange = document.getElementById('clipStartRange');
  const endRange = document.getElementById('clipEndRange');
  const s = Number(startRange.value);
  const e = Number(endRange.value);
  startRange.max = Math.max(e - 1, 0);
  endRange.min = Math.min(s + 1, clipDuration);
}
function syncClipSliders(){
  const startRange = document.getElementById('clipStartRange');
  const endRange = document.getElementById('clipEndRange');
  const s = clipStart !== null ? clipStart : 0;
  const e = clipEnd !== null ? clipEnd : clipDuration;
  // 값을 대입하기 전에 범위를 넉넉하게 풀어둬야 새 값이 이전 범위에 잘려나가지 않는다
  startRange.max = clipDuration;
  endRange.min = 0;
  startRange.value = s;
  endRange.value = e;
  updateClipSliderBounds();
  updateClipSliderLabels();
  updateClipRangeFill();
}

// 슬라이더의 min/max/value를 넘겨준 duration 기준으로 확정한다 (구간 재설정 시 공통으로 재사용)
function applyClipDuration(duration){
  clipDuration = duration;
  const startRange = document.getElementById('clipStartRange');
  const endRange = document.getElementById('clipEndRange');
  startRange.min = 0; startRange.max = Math.max(clipDuration - 1, 0); startRange.value = 0;
  endRange.min = Math.min(1, clipDuration); endRange.max = clipDuration; endRange.value = clipDuration;
  updateClipSliderLabels();
  updateClipRangeFill();
}
function loadClipPlayer(){
  const url = document.getElementById('mVideoUrl').value.trim();
  const p = parseYouTube(url);
  if(!p){ setModalMsg('유튜브 링크를 확인해주세요.', 'err'); return; }
  setModalMsg('');
  clipStart = null; clipEnd = null; updateClipLabel();
  document.getElementById('clipTools').style.display = 'block';
  document.getElementById('clipPlayerWrap').className = 'clip-player' + (p.isShort ? ' tall' : '');

  // 이전 영상의 duration/슬라이더 상태가 새 영상 로딩 중에 잠깐이라도 남아있지 않도록 즉시 0으로 초기화
  applyClipDuration(0);

  if(clipYtPlayer && clipYtPlayer.destroy){ clipYtPlayer.destroy(); clipYtPlayer = null; }
  const mount = document.createElement('div');
  mount.id = 'clipPlayer';
  document.getElementById('clipPlayerWrap').innerHTML = '';
  document.getElementById('clipPlayerWrap').appendChild(mount);

  const build = () => {
    clipYtPlayer = new YT.Player('clipPlayer', {
      videoId: p.id,
      playerVars: { playsinline: 1, enablejsapi: 1, origin: location.origin, rel: 0, cc_load_policy: 0 },
      events: {
        onReady: (e) => {
          e.target.setVolume(50);
          // onReady 시점의 getDuration()은 (특히 쇼츠에서) 메타데이터가 아직 다 안 실려서
          // 0이거나 실제보다 작은 값을 반환할 수 있다. 두 번 연속 같은 값이 나올 때까지
          // 짧게 재확인해서, duration이 실제로 "확정"된 시점에만 슬라이더에 반영한다.
          let attempts = 0;
          let lastDuration = -1;
          const player = e.target;
          const poll = () => {
            const d = Math.floor(player.getDuration()) || 0;
            attempts++;
            const stable = d > 0 && d === lastDuration;
            if(stable || attempts >= 20){
              applyClipDuration(d);
              return;
            }
            lastDuration = d;
            setTimeout(poll, 150);
          };
          poll();
        }
      }
    });
  };
  if(ytReady && window.YT && YT.Player){ build(); }
  else { const iv = setInterval(() => { if(window.YT && YT.Player){ clearInterval(iv); ytReady = true; build(); } }, 200); }
}
function markClipStart(){
  if(!clipYtPlayer || !clipYtPlayer.getCurrentTime) return;
  clipStart = Math.floor(clipYtPlayer.getCurrentTime());
  if(clipEnd !== null && clipEnd <= clipStart) clipEnd = null;
  syncClipSliders();
  updateClipLabel();
}
function markClipEnd(){
  if(!clipYtPlayer || !clipYtPlayer.getCurrentTime) return;
  const t = Math.floor(clipYtPlayer.getCurrentTime());
  if(clipStart !== null && t <= clipStart){ setModalMsg('끝은 시작보다 뒤여야 해요.', 'err'); return; }
  clipEnd = t; setModalMsg('');
  syncClipSliders();
  updateClipLabel();
}
function clearClip(){
  clipStart = null; clipEnd = null;
  syncClipSliders();
  updateClipLabel();
}
function onClipScrubStart(){
  if(clipYtPlayer && clipYtPlayer.pauseVideo) clipYtPlayer.pauseVideo();
}
function scrubClipPreview(t){
  if(!clipYtPlayer || !clipYtPlayer.seekTo) return;
  const now = Date.now();
  if(now - clipScrubLastSeek < 100) return; // 과도한 seekTo 호출 방지 (약 100ms 스로틀)
  clipScrubLastSeek = now;
  clipYtPlayer.seekTo(t, true);
}
function onClipStartInput(){
  const endRange = document.getElementById('clipEndRange');
  clipStart = Number(document.getElementById('clipStartRange').value);
  clipEnd = Number(endRange.value);
  endRange.min = Math.min(clipStart + 1, clipDuration);
  updateClipSliderLabels();
  updateClipRangeFill();
  updateClipLabel();
  scrubClipPreview(clipStart);
}
function onClipStartChange(){
  if(clipYtPlayer && clipYtPlayer.seekTo) clipYtPlayer.seekTo(clipStart, true);
}
function onClipEndInput(){
  const startRange = document.getElementById('clipStartRange');
  clipEnd = Number(document.getElementById('clipEndRange').value);
  clipStart = Number(startRange.value);
  startRange.max = Math.max(clipEnd - 1, 0);
  updateClipSliderLabels();
  updateClipRangeFill();
  updateClipLabel();
  scrubClipPreview(clipEnd);
}
function onClipEndChange(){
  if(clipYtPlayer && clipYtPlayer.seekTo) clipYtPlayer.seekTo(clipEnd, true);
}

function loadImageIntoCropper(file){
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = document.getElementById('cropperImg');
    img.src = ev.target.result;
    document.getElementById('cropperWrap').style.display = 'block';
    if(cropper) cropper.destroy();
    cropper = new Cropper(img, { viewMode: 1, autoCropArea: 1, background: false });
  };
  reader.readAsDataURL(file);
}

document.getElementById('mImageFile').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  loadImageIntoCropper(file);
});

document.addEventListener('paste', function(e){
  if(modalType !== 'img') return;
  if(!document.getElementById('addModal').classList.contains('active')) return;
  const clipboardItems = (e.clipboardData || window.clipboardData).items;
  for(const item of clipboardItems){
    if(item.type.indexOf('image') !== -1){
      const file = item.getAsFile();
      if(file){ loadImageIntoCropper(file); }
      break;
    }
  }
});

function openAddModal(tag){
  modalTag = tag;
  document.getElementById('mTitle').value = '';
  document.getElementById('mNote').value = '';
  document.getElementById('mVideoUrl').value = '';
  document.getElementById('mImageFile').value = '';
  document.getElementById('modalMsg').textContent = '';
  if(cropper){ cropper.destroy(); cropper = null; }
  document.getElementById('cropperWrap').style.display = 'none';

  clipStart = null; clipEnd = null;
  applyClipDuration(0);
  document.getElementById('clipTools').style.display = 'none';
  if(clipYtPlayer && clipYtPlayer.destroy){ clipYtPlayer.destroy(); clipYtPlayer = null; }
  updateClipLabel();

  const isMapLabel = (tag === '맵 지명');
  document.getElementById('modalTitle').textContent = tag + '에 추가';
  document.getElementById('titleWrap').style.display = isMapLabel ? 'none' : 'block';
  document.getElementById('typeToggle').style.display = isMapLabel ? 'none' : 'flex';
  setModalType(isMapLabel ? 'img' : 'vid');

  document.getElementById('addModal').classList.add('active');
}
function closeModal(){
  document.getElementById('addModal').classList.remove('active');
  if(cropper){ cropper.destroy(); cropper = null; }
  if(clipYtPlayer && clipYtPlayer.destroy){ clipYtPlayer.destroy(); clipYtPlayer = null; }
}
function setModalType(t){
  modalType = t;
  document.getElementById('ttVid').className = t === 'vid' ? 'on' : '';
  document.getElementById('ttImg').className = t === 'img' ? 'on' : '';
  document.getElementById('videoWrap').style.display = t === 'vid' ? 'block' : 'none';
  document.getElementById('imageWrap').style.display = t === 'img' ? 'block' : 'none';
}
function setModalMsg(t, cls){
  const el = document.getElementById('modalMsg');
  el.className = 'msg-modal' + (cls ? (' ' + cls) : '');
  el.textContent = t;
}
async function submitItem(){
  const isMapLabel = (modalTag === '맵 지명');
  const title = isMapLabel ? '맵 전체 지명' : document.getElementById('mTitle').value.trim();
  const note = isMapLabel ? '' : document.getElementById('mNote').value.trim();
  if(!isMapLabel && !title){ setModalMsg('제목을 입력해주세요.', 'err'); return; }

  const saveBtn = document.getElementById('modalSaveBtn');
  saveBtn.disabled = true;
  setModalMsg('저장 중...');

  if(modalType === 'vid'){
    const url = document.getElementById('mVideoUrl').value.trim();
    const p = parseYouTube(url);
    if(!p){ setModalMsg('유튜브 링크를 확인해주세요.', 'err'); saveBtn.disabled = false; return; }

    const { error } = await sb.from('items').insert({
      map_id: currentMap, team: currentTeam, type: 'vid', tag: modalTag,
      title, note: note || null, video_url: url, clip_start: clipStart, clip_end: clipEnd
    });
    if(error){ setModalMsg('저장 실패: ' + error.message, 'err'); saveBtn.disabled = false; return; }
  } else {
    if(!cropper){ setModalMsg('이미지를 선택하거나 붙여넣어주세요.', 'err'); saveBtn.disabled = false; return; }

    setModalMsg('업로드 중...');
    const blob = await new Promise(res => cropper.getCroppedCanvas().toBlob(res, 'image/jpeg', 0.92));
    const path = `items/${Date.now()}.jpg`;
    const { error: upErr } = await sb.storage.from('media').upload(path, blob, { contentType: 'image/jpeg' });
    if(upErr){ setModalMsg('업로드 실패: ' + upErr.message, 'err'); saveBtn.disabled = false; return; }
    const { data: pub } = sb.storage.from('media').getPublicUrl(path);

    setModalMsg('저장 중...');
    const { error } = await sb.from('items').insert({
      map_id: currentMap, team: currentTeam, type: 'img', tag: modalTag,
      title, note: note || null, img_url: pub.publicUrl, video_url: null, clip_start: null, clip_end: null
    });
    if(error){ setModalMsg('저장 실패: ' + error.message, 'err'); saveBtn.disabled = false; return; }
  }

  setModalMsg('추가 완료!', 'ok');
  setTimeout(async () => { closeModal(); saveBtn.disabled = false; await loadAll(); renderCards(); }, 500);
}

let editMode = false;
function toggleEditMode(){
  editMode = !editMode;
  const btn = document.getElementById('editModeBtn');
  if(btn){
    btn.classList.toggle('on', editMode);
    btn.textContent = editMode ? '편집모드 ON' : '편집모드';
  }
  renderMapGrid();
  if(document.getElementById('viewDetail').classList.contains('active')) renderCards();
}

async function renderAuthArea(session){
  const el = document.getElementById('authArea');
  if(session){
    const nickname = session.user.user_metadata.full_name || session.user.user_metadata.name || '사용자';
    let isAdmin = false;
    try {
      const { data } = await sb.from('admins').select('user_id').eq('user_id', session.user.id).maybeSingle();
      isAdmin = !!data;
    } catch(e){
      isAdmin = false;
    }

    el.innerHTML = `
      <span class="mono" style="font-size:12px;color:var(--text);">${nickname}</span>
      ${isAdmin ? '<span class="admin-badge">관리자</span>' : ''}
      ${isAdmin ? '<button id="editModeBtn" class="editmode-btn">편집모드</button>' : ''}
      <button id="logoutBtn" class="discord-btn">로그아웃</button>
    `;
    document.getElementById('logoutBtn').onclick = async () => {
      await sb.auth.signOut();
    };
    if(isAdmin){
      document.getElementById('editModeBtn').onclick = toggleEditMode;
    }
  } else {
    editMode = false;
    renderMapGrid();
    if(document.getElementById('viewDetail').classList.contains('active')) renderCards();
    el.innerHTML = `<button id="discordLoginBtn" class="discord-btn">디스코드로 로그인</button>`;
    document.getElementById('discordLoginBtn').onclick = async () => {
      const { error } = await sb.auth.signInWithOAuth({ provider: 'discord' });
      if(error) alert('로그인 실패: ' + error.message);
    };
  }
}

async function initAuth(){
  const { data: { session } } = await sb.auth.getSession();
  await renderAuthArea(session);
  sb.auth.onAuthStateChange((event, session) => {
    renderAuthArea(session);
  });
}

initAuth();
loadAll();
</script>
